<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Progress Cards | Paramount School</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --forest: #006633; --gold: #ffd700; --light: #f4f7f6; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding-bottom: 50px; }
        
        header { background: var(--forest); color: white; padding: 15px 3%; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header-logo { height: 50px; margin-bottom: 5px; }
        .title { font-family: 'Montserrat'; font-weight: 800; font-size: 1.2rem; display: block; }

        .container { max-width: 900px; margin: 20px auto; padding: 0 15px; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.05); border-top: 8px solid var(--forest); margin-bottom: 20px; }
        
        .setup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        label { font-size: 10px; font-weight: 900; color: #777; text-transform: uppercase; display: block; margin-bottom: 5px; }
        select, input { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #eee; font-size: 14px; outline: none; background: #fafafa; }

        /* Marks Table Styling */
        .student-mark-card { background: #fff; border: 1px solid #eee; border-radius: 15px; padding: 15px; margin-bottom: 15px; }
        .student-name { font-weight: 800; color: var(--forest); margin-bottom: 10px; display: block; border-bottom: 1px solid #f0f0f0; padding-bottom: 5px; }
        
        .marks-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .subject-box { text-align: center; }
        .subject-box label { font-size: 9px; margin-bottom: 3px; }
        .subject-box input { text-align: center; padding: 8px; font-weight: bold; }

        .stats-bar { display: flex; justify-content: space-between; margin-top: 15px; padding-top: 10px; border-top: 1px dashed #ccc; font-size: 12px; font-weight: bold; }
        .btn-save { background: var(--forest); color: white; border: 2px solid var(--gold); padding: 15px; width: 100%; border-radius: 50px; font-weight: 800; cursor: pointer; margin-top: 20px; }
        
        @media (max-width: 600px) {
            .marks-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<header>
    <img src="logo.png" class="header-logo">
    <span class="title">PARAMOUNT PROGRESS PORTAL</span>
</header>

<div class="container">
    <div class="card">
        <div class="setup-grid">
            <div>
                <label>Select Class</label>
                <select id="examClass" onchange="loadStudentMarksheet()">
                    <option value="">-- Class --</option>
                    <option value="Grade-1">Grade-1</option>
                    <option value="Grade-2">Grade-2</option>
                    <option value="Grade-3">Grade-3</option>
                    <option value="Grade-4">Grade-4</option>
                    <option value="Grade-5">Grade-5</option>
                </select>
            </div>
            <div>
                <label>Exam Type</label>
                <select id="examType" onchange="loadStudentMarksheet()">
                    <option value="FA-1">FA-1</option>
                    <option value="FA-2">FA-2</option>
                    <option value="SA-1">SA-1 (Half Yearly)</option>
                    <option value="SA-2">SA-2 (Annual)</option>
                </select>
            </div>
        </div>
    </div>

    <div id="marksList"></div>
    <button id="saveAllBtn" class="btn-save" style="display:none;" onclick="saveAllMarks()">UPLOAD PROGRESS CARDS <i class="fas fa-cloud-upload-alt"></i></button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
    // USE YOUR EXISTING CONFIG
    const firebaseConfig = { apiKey: "AIzaSyDRYk9KOK-ga0c88dnYMsAoifW2NJTd_Y8", databaseURL: "https://paramount-school-d55bc-default-rtdb.firebaseio.com", projectId: "paramount-school-d55bc" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Reusing your student list
    const studentData = {
        "Grade-1": ["Dheeraj Gattu", "Preetham Sannayala", "Shiva nandu Gonela", "Shrayan Nuthanakanti"],
        "Grade-5": ["Adya Reddy Vangala", "Kowshik Patel Muppa", "Siri Singaram"]
        // ... (Add all your other classes here)
    };

    function loadStudentMarksheet() {
        const cls = document.getElementById('examClass').value;
        const exam = document.getElementById('examType').value;
        const list = document.getElementById('marksList');
        
        if(!cls) return;

        list.innerHTML = `<p style="text-align:center;">Generating sheet for ${cls}...</p>`;

        let html = "";
        studentData[cls].forEach((name, index) => {
            html += `
            <div class="student-mark-card" data-student="${name}">
                <span class="student-name">${index + 1}. ${name}</span>
                <div class="marks-grid">
                    <div class="subject-box"><label>Telugu</label><input type="number" class="m-tel" oninput="calculateStats(this)"></div>
                    <div class="subject-box"><label>Hindi</label><input type="number" class="m-hin" oninput="calculateStats(this)"></div>
                    <div class="subject-box"><label>English</label><input type="number" class="m-eng" oninput="calculateStats(this)"></div>
                    <div class="subject-box"><label>Maths</label><input type="number" class="m-mat" oninput="calculateStats(this)"></div>
                    <div class="subject-box"><label>Science</label><input type="number" class="m-sci" oninput="calculateStats(this)"></div>
                    <div class="subject-box"><label>Social</label><input type="number" class="m-soc" oninput="calculateStats(this)"></div>
                </div>
                <div class="stats-bar">
                    <span>Total: <span class="res-total">0</span></span>
                    <span>%: <span class="res-perc">0</span>%</span>
                    <span>Grade: <span class="res-grade">-</span></span>
                </div>
            </div>`;
        });

        list.innerHTML = html;
        document.getElementById('saveAllBtn').style.display = 'block';
    }

    function calculateStats(input) {
        const card = input.closest('.student-mark-card');
        const marks = Array.from(card.querySelectorAll('input')).map(i => parseInt(i.value) || 0);
        const total = marks.reduce((a, b) => a + b, 0);
        const perc = ((total / 600) * 100).toFixed(1); // Assuming 100 per subject

        let grade = "F";
        if(perc >= 91) grade = "A1";
        else if(perc >= 81) grade = "A2";
        else if(perc >= 71) grade = "B1";
        else if(perc >= 61) grade = "B2";
        else if(perc >= 51) grade = "C1";
        else if(perc >= 35) grade = "D";

        card.querySelector('.res-total').innerText = total;
        card.querySelector('.res-perc').innerText = perc;
        card.querySelector('.res-grade').innerText = grade;
    }

    function saveAllMarks() {
        const cls = document.getElementById('examClass').value;
        const exam = document.getElementById('examType').value;
        const cards = document.querySelectorAll('.student-mark-card');
        const updates = {};

        cards.forEach(card => {
            const name = card.getAttribute('data-student');
            updates[`marks/${cls}/${exam}/${name}`] = {
                telugu: card.querySelector('.m-tel').value,
                hindi: card.querySelector('.m-hin').value,
                english: card.querySelector('.m-eng').value,
                maths: card.querySelector('.m-mat').value,
                science: card.querySelector('.m-sci').value,
                social: card.querySelector('.m-soc').value,
                total: card.querySelector('.res-total').innerText,
                percentage: card.querySelector('.res-perc').innerText,
                grade: card.querySelector('.res-grade').innerText
            };
        });

        db.ref().update(updates).then(() => {
            alert("Success! All Progress Cards have been uploaded.");
        });
    }
</script>
</body>
</html>
