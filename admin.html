<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Paramount School</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --forest: #006633; --gold: #ffd700; --danger: #c62828; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 0; }
        .overlay-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(244, 247, 246, 0.95); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .auth-box { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 350px; position: relative; }
        .auth-box input { padding: 12px; width: 100%; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; box-sizing: border-box; }
        .auth-btn { background: var(--forest); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        header { background: var(--forest); color: white; padding: 20px 5%; display: flex; justify-content: center; align-items: center; gap: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .logo-img { height: 70px; width: auto; display: block; }
        .container { max-width: 900px; margin: 30px auto; padding: 0 15px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .controls { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }
        .select-group { flex: 1; min-width: 180px; }
        label { display: block; font-size: 13px; font-weight: bold; color: #666; margin-bottom: 8px; text-transform: uppercase; }
        select, .hw-input { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #ddd; font-size: 16px; outline: none; box-sizing: border-box; }
        .fetch-btn { background: #006633; color: white; border: none; padding: 0 25px; border-radius: 8px; font-weight: bold; cursor: pointer; height: 48px; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: var(--forest); color: white; font-weight: bold; text-transform: uppercase; font-size: 13px; }
        #mainApp { display: none; } 
    </style>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

<div id="loginScreen" class="overlay-screen">
    <div class="auth-box">
        <h2 style="color: #006633; margin-top: 0;">Admin Access</h2>
        <input type="password" id="adminPassword" placeholder="Enter Password" onkeypress="if(event.key === 'Enter') checkPassword()">
        <button class="auth-btn" onclick="checkPassword()">Login</button>
        <p id="loginError" style="color: #c62828; display: none; margin-top: 15px; font-weight: bold;">Incorrect Password</p>
    </div>
</div>

<div id="mainApp">
    <header>
        <img src="logo.png" alt="Logo" class="logo-img">
        <div class="school-info">
            <h1 class="school-name">PARAMOUNT ENGLISH MEDIUM SCHOOL</h1>
            <p style="color: var(--gold); margin: 0; font-weight: bold;"><i class="fas fa-user-shield"></i> Cloud Admin Dashboard</p>
        </div>
    </header>

    <div class="container">
        <div class="card" style="border-left: 6px solid var(--forest);">
            <h3><i class="fas fa-edit"></i> Post Daily Homework</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div><label>Date</label><input type="date" id="hwDate" class="hw-input"></div>
                <div><label>Subject</label><input type="text" id="hwSubject" class="hw-input" placeholder="e.g. English"></div>
            </div>
            <label style="margin-top: 15px;">Homework Task</label>
            <textarea id="hwTask" style="width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #ddd; min-height: 80px; font-family: inherit;" placeholder="Enter details..."></textarea>
            <button class="auth-btn" onclick="saveHomework()"><i class="fas fa-paper-plane"></i> Publish to Diary</button>
        </div>

        <div class="card" style="border-left: 6px solid var(--gold);">
            <h3><i class="fas fa-bullhorn"></i> Live Cloud Announcement</h3>
            <textarea id="announcementInput" style="width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #ddd; min-height: 80px; font-family: inherit;" placeholder="E.g. School closed tomorrow..."></textarea>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button onclick="publishAnnouncement()" class="auth-btn" style="flex: 1;"><i class="fas fa-cloud-upload-alt"></i> Publish</button>
                <button onclick="clearAnnouncement()" style="background: #ffebee; color: var(--danger); border: 1px solid #ef9a9a; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer;"><i class="fas fa-times"></i> Remove</button>
            </div>
        </div>

        <div class="card">
            <h3><i class="fas fa-chart-bar"></i> Attendance Monitoring</h3>
            <div class="controls">
                <div class="select-group">
                    <label>Select Class</label>
                    <select id="classSelect">
                        <option value="Pre-KG">Pre-KG (Diamond)</option>
                        <option value="KG-1">KG-1 (Ruby)</option>
                        <option value="KG-2">KG-2 (Amber)</option>
                        <option value="Grade-1">Grade-1 (Opal)</option>
                        <option value="Grade-2">Grade-2 (Emerald)</option>
                        <option value="Grade-3">Grade-3 (Crystal)</option>
                        <option value="Grade-4">Grade-4 (Citrine)</option>
                        <option value="Grade-5">Grade-5 (Moonstone)</option>
                        <option value="Grade-6">Grade-6 (Alluri)</option>
                        <option value="Grade-7">Grade-7 (Kalam)</option>
                        <option value="Grade-8">Grade-8 (Bhagat)</option>
                    </select>
                </div>
                <button class="fetch-btn" onclick="loadClassData()"><i class="fas fa-search"></i> View Data</button>
            </div>
            <table id="dataTable">
                <thead><tr><th>Student Name</th><th>Present</th><th>Total</th><th>Percentage</th></tr></thead>
                <tbody id="tableBody"><tr><td colspan="4" style="text-align:center; padding:20px; color:#888;">Select class and click View Data.</td></tr></tbody>
            </table>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDRYk9KOK-ga0c88dnYMsAoifW2NJTd_Y8",
  databaseURL: "https://paramount-school-d55bc-default-rtdb.firebaseio.com",
  projectId: "paramount-school-d55bc"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// --- AUTH LOGIC ---
function checkPassword() {
    if (document.getElementById('adminPassword').value === "Ahmad@07") {
        document.getElementById('loginScreen').style.display = "none";
        document.getElementById('mainApp').style.display = "block";
    } else { document.getElementById('loginError').style.display = "block"; }
}

// --- HOMEWORK LOGIC ---
function saveHomework() {
    const date = document.getElementById('hwDate').value;
    const subject = document.getElementById('hwSubject').value;
    const task = document.getElementById('hwTask').value;
    
    if(!date || !subject || !task) return alert("Please fill all homework fields!");

    const postTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    db.ref(`homework/${date}`).update({
        [subject]: task,
        lastUpdated: postTime 
    }).then(() => {
        Swal.fire('Posted!', `Homework updated at ${postTime}`, 'success');
        document.getElementById('hwSubject').value = "";
        document.getElementById('hwTask').value = "";
    });
}

// --- ANNOUNCEMENT LOGIC ---
function publishAnnouncement() {
    const text = document.getElementById('announcementInput').value.trim();
    if(text) db.ref('announcement').set(text).then(() => alert("Broadcast Live!"));
}
function clearAnnouncement() {
    db.ref('announcement').remove().then(() => alert("Announcement Cleared!"));
}

// --- ATTENDANCE LOGIC ---
function loadClassData() {
    const cls = document.getElementById('classSelect').value;
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">Fetching...</td></tr>';

    db.ref('attendance').once('value').then((snap) => {
        const data = snap.val() || {};
        if (!data[cls] || !data[cls].students) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">No data found.</td></tr>';
            return;
        }
        tbody.innerHTML = "";
        const students = data[cls].students;
        for (const name in students) {
            const stats = students[name];
            const percent = stats.totalDays > 0 ? Math.round((stats.presentDays / stats.totalDays) * 100) : 0;
            tbody.innerHTML += `<tr><td>${name}</td><td>${stats.presentDays}</td><td>${stats.totalDays}</td><td>${percent}%</td></tr>`;
        }
    });
}
</script>
</body>
</html>
