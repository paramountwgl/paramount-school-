<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Dashboard | Paramount School</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --forest: #006633; --gold: #ffd700; --danger: #c62828; --light: #f4f7f6; }
        * { box-sizing: border-box; } 
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding-bottom: 150px; overflow-x: hidden; }
        
        /* LOGIN & RECOVERY SCREENS */
        .overlay-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--light); z-index: 9999; display: flex; justify-content: center; align-items: center; padding: 15px; }
        .auth-box { background: white; padding: 40px 25px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 450px; border-bottom: 5px solid var(--forest); text-align: center; }
        
        /* LOGO AT LEFT CORNER BESIDE ICON */
        .auth-header-row { display: flex; align-items: center; justify-content: flex-start; gap: 12px; margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .auth-logo { height: 50px; width: auto; }
        .secure-icon { font-size: 30px; color: var(--forest); border-left: 2px solid #ddd; padding-left: 12px; }
        .auth-branding-text { text-align: left; line-height: 1.1; }
        .auth-branding-text h2 { margin: 0; font-family: 'Montserrat', sans-serif; font-size: 1.1rem; font-weight: 800; color: var(--forest); }
        .auth-branding-text p { margin: 0; font-size: 0.65rem; font-weight: 700; color: var(--gold); text-transform: uppercase; }

        .auth-input { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #eee; margin-bottom: 15px; text-align: center; font-size: 16px; outline: none; }
        .auth-links { margin-top: 15px; display: flex; flex-direction: column; gap: 10px; }
        .auth-links span { color: #666; font-size: 13px; text-decoration: underline; cursor: pointer; font-weight: 600; }

        /* DASHBOARD HEADER */
        header { background: var(--forest); color: white; padding: 25px 3%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; }
        .header-content { display: flex; align-items: center; justify-content: flex-start; max-width: 1400px; margin: 0 auto; width: 100%; gap: 20px; }
        .divider { width: 2px; height: 55px; background-color: rgba(255, 255, 255, 0.3); flex-shrink: 0; }
        .school-branding { display: flex; flex-direction: column; line-height: 1; text-align: left; }
        .school-name-main { font-family: 'Montserrat', sans-serif; font-size: clamp(1.4rem, 4vw, 2.4rem); font-weight: 800; letter-spacing: 1px; }
        .school-name-sub { font-family: 'Montserrat', sans-serif; font-size: clamp(0.7rem, 2vw, 1rem); color: var(--gold); font-weight: 700; text-transform: uppercase; margin-top: 5px; }
        .admin-portal-text { font-family: 'Montserrat', sans-serif; font-size: clamp(1.2rem, 3.5vw, 2.2rem); font-weight: 800; text-transform: uppercase; white-space: nowrap; }

        /* CONTENT CARDS */
        .container { max-width: 850px; margin: 30px auto; padding: 0 15px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 25px; border-top: 6px solid var(--forest); }
        h3 { color: var(--forest); margin: 0 0 20px; font-size: 1.2rem; border-bottom: 1px solid #eee; padding-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        
        .btn-attract { background: linear-gradient(135deg, var(--forest), #004d26); color: white; padding: 14px 35px; border-radius: 50px; font-weight: bold; border: 2px solid rgba(255, 215, 0, 0.3); cursor: pointer; font-size: 14px; transition: 0.3s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; width: 100%; margin-top: 10px; }
        .btn-attract:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0, 102, 51, 0.5); }
        
        .table-container { width: 100%; overflow-x: auto; border-radius: 10px; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: var(--forest); color: white; padding: 12px; font-size: 11px; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; }

        /* PREMIUM BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; padding: 25px 0; background: white; display: flex; justify-content: center; z-index: 1000; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); }
        .btn-premium { background: linear-gradient(135deg, #004d26, var(--forest)); color: white; padding: 16px 50px; border-radius: 60px; font-weight: 800; text-decoration: none; font-size: 15px; border: 2px solid var(--gold); transition: 0.3s; display: inline-flex; align-items: center; gap: 12px; box-shadow: 0 8px 20px rgba(0, 102, 51, 0.3); }
    </style>
</head>
<body>

<div id="loginScreen" class="overlay-screen">
    <div class="auth-box">
        <div class="auth-header-row">
            <img src="logo.png" class="auth-logo" alt="Logo">
            <i class="fas fa-user-shield secure-icon"></i>
            <div class="auth-branding-text">
                <h2>PARAMOUNT</h2>
                <p>Admin Access Box</p>
            </div>
        </div>
        <input type="password" id="adminPass" class="auth-input" placeholder="Admin Password">
        <button onclick="login()" class="btn-attract">Unlock Dashboard <i class="fas fa-unlock"></i></button>
        <div class="auth-links">
            <span onclick="window.location.href='index.html'">Cancel & Return</span>
            <span onclick="openRecovery()">Forgot Password?</span>
        </div>
    </div>
</div>

<div id="recoveryScreen" class="overlay-screen" style="display:none;">
    <div class="auth-box">
        <i class="fas fa-key secure-icon" style="color:var(--gold); border:none;"></i>
        <h2>Reset Admin Key</h2>
        <input type="password" id="masterKey" class="auth-input" placeholder="Enter Master Key">
        <input type="password" id="newPass" class="auth-input" placeholder="New Password">
        <button onclick="recoverPass()" class="btn-attract">Update Access</button>
        <div class="auth-links"><span onclick="closeRecovery()">Back to Login</span></div>
    </div>
</div>

<div id="mainApp" style="display:none;">
    <header>
        <div class="header-content">
            <img src="logo.png" style="height:70px; width:auto;" alt="Logo">
            <div class="divider"></div>
            <div class="school-branding">
                <span class="school-name-main">PARAMOUNT</span>
                <span class="school-name-sub">ENGLISH MEDIUM SCHOOL</span>
            </div>
            <div class="divider"></div>
            <div class="admin-portal-text">ADMIN PORTAL</div>
        </div>
    </header>

    <div class="container">
        <div class="card" style="border-top-color: var(--gold);">
            <h3><i class="fas fa-bullhorn"></i> School Broadcast</h3>
            <textarea id="annMsg" style="width:100%; height:100px; padding:15px; border-radius:10px; border:2px solid #eee; outline:none; margin-bottom:20px; resize:none;" placeholder="Broadcast message for teachers..."></textarea>
            <button onclick="postAnn()" class="btn-attract">Publish Now <i class="fas fa-check-circle"></i></button>
        </div>

        <div class="card">
            <h3><i class="fas fa-calendar-check"></i> Attendance Monitoring</h3>
            <div style="display:flex; flex-direction:column; gap:15px;">
                <div style="display:flex; gap:10px; flex-wrap:wrap;">
                    <select id="clsPick" class="auth-input" style="flex:1; margin:0;">
                        <option value="">-- Choose Class --</option>
                        <option value="Grade-1">Grade-1</option>
                        </select>
                    <select id="viewType" class="auth-input" style="flex:1; margin:0;" onchange="toggleFilterInputs()">
                        <option value="total">Overall Totals</option>
                        <option value="monthly">Monthly Breakdown</option>
                        <option value="daily">Specific Date</option>
                    </select>
                </div>
                <div id="monthlyFilter" style="display:none;"><input type="month" id="monthInput" class="auth-input" style="margin:0; width:100%;"></div>
                <div id="dailyFilter" style="display:none;"><input type="date" id="dateInput" class="auth-input" style="margin:0; width:100%;"></div>
                <button onclick="viewAtt()" class="btn-attract" style="background:#2196f3;">View Report</button>
            </div>
            <div class="table-container"><table id="resultsTable"><thead><tr><th>Student</th><th>P</th><th>A</th><th>Total</th><th>%</th></tr></thead><tbody id="attBody"></tbody></table></div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="index.html" class="btn-premium">
            <i class="fas fa-chalkboard-teacher"></i> Open Teacher Portal
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDRYk9KOK-ga0c88dnYMsAoifW2NJTd_Y8", databaseURL: "https://paramount-school-d55bc-default-rtdb.firebaseio.com", projectId: "paramount-school-d55bc" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function openRecovery() { document.getElementById('loginScreen').style.display='none'; document.getElementById('recoveryScreen').style.display='flex'; }
    function closeRecovery() { document.getElementById('recoveryScreen').style.display='none'; document.getElementById('loginScreen').style.display='flex'; }

    async function login() {
        const snap = await db.ref('admin/password').once('value');
        const correct = snap.val() || "Ahmad@07";
        if(document.getElementById('adminPass').value === correct) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
        } else { Swal.fire('Error', 'Wrong Password', 'error'); }
    }

    function recoverPass() {
        if(document.getElementById('masterKey').value === "paramount") {
            db.ref('admin/password').set(document.getElementById('newPass').value).then(() => {
                Swal.fire('Success', 'Password Updated!', 'success');
                closeRecovery();
            });
        } else { Swal.fire('Error', 'Invalid Master Key', 'error'); }
    }

    function toggleFilterInputs() {
        const type = document.getElementById('viewType').value;
        document.getElementById('monthlyFilter').style.display = (type === 'monthly') ? 'block' : 'none';
        document.getElementById('dailyFilter').style.display = (type === 'daily') ? 'block' : 'none';
    }

    function postAnn() { db.ref('announcement').set(document.getElementById('annMsg').value).then(() => Swal.fire('Published', 'Teacher Portal updated.', 'success')); }

    async function viewAtt() {
        const cls = document.getElementById('clsPick').value;
        const type = document.getElementById('viewType').value;
        const body = document.getElementById('attBody');
        if(!cls) return Swal.fire('Error', 'Pick a class', 'info');
        body.innerHTML = 'Loading...';

        db.ref(`attendance/${cls}/students`).once('value', (snap) => {
            const data = snap.val() || {};
            body.innerHTML = Object.keys(data).map(n => {
                let p=0, t=0;
                if(type === 'monthly') {
                    const m = document.getElementById('monthInput').value;
                    const mD = (data[n].months && data[n].months[m]) ? data[n].months[m] : {present:0, total:0};
                    p = mD.present; t = mD.total;
                } else { if (data[n].months) Object.values(data[n].months).forEach(v => { p += v.present; t += v.total; }); }
                return `<tr><td>${n}</td><td>${p}</td><td>${t-p}</td><td>${t}</td><td>${t>0?Math.round(p/t*100):0}%</td></tr>`;
            }).join('') || 'No data';
        });
    }
</script>
</body>
</html>
