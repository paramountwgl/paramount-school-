<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Dashboard | Paramount School</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --forest: #006633; --gold: #ffd700; --danger: #c62828; --light: #f4f7f6; }
        * { box-sizing: border-box; } 
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding-bottom: 120px; overflow-x: hidden; }
        
        /* LOGIN & RECOVERY SCREENS */
        .overlay-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--light); z-index: 9999; display: flex; justify-content: center; align-items: center; padding: 15px; }
        .auth-box { background: white; padding: 40px 25px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 400px; border-bottom: 5px solid var(--forest); text-align: center; }
        .secure-icon { font-size: 50px; color: var(--forest); margin: 0 auto 15px auto; display: block; }
        .auth-title { color: var(--forest); margin: 0; font-family: 'Montserrat', sans-serif; font-size: 1.5rem; font-weight: 800; }
        .auth-input { width: 100%; max-width: 320px; padding: 12px; border-radius: 10px; border: 2px solid #eee; margin: 20px auto; text-align: center; font-size: 16px; outline: none; display: block; }
        .auth-links { margin-top: 15px; display: flex; flex-direction: column; gap: 8px; }
        .auth-links span { color: #666; font-size: 13px; text-decoration: underline; cursor: pointer; }

        /* HEADER & BRANDING BOX */
        header { background: var(--forest); color: white; padding: 15px 3%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; }
        .header-content { display: flex; align-items: center; justify-content: space-between; max-width: 1400px; margin: 0 auto; width: 100%; }
        
        .header-left { display: flex; align-items: center; }
        .admin-access-box { 
            background: rgba(255, 255, 255, 0.1); 
            padding: 8px 18px; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            border: 1px solid rgba(255, 215, 0, 0.3); 
        }
        .header-logo { height: 48px; width: auto; }
        .shield-icon { color: var(--gold); font-size: 1.3rem; }
        .school-text { display: flex; flex-direction: column; line-height: 1.1; white-space: nowrap; }
        .school-name-main { font-family: 'Montserrat', sans-serif; font-size: 1.1rem; font-weight: 800; }
        .admin-label { font-family: 'Montserrat', sans-serif; font-size: 0.7rem; color: var(--gold); font-weight: 700; text-transform: uppercase; margin-top: 2px; }

        /* DASHBOARD CARDS */
        .container { max-width: 850px; margin: 30px auto; padding: 0 15px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 25px; border-top: 6px solid var(--forest); }
        h3 { color: var(--forest); margin: 0 0 20px; font-size: 1.2rem; border-bottom: 1px solid #eee; padding-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        
        .btn-attract { background: linear-gradient(135deg, var(--forest), #004d26); color: white; padding: 14px 30px; border-radius: 50px; font-weight: bold; border: 2px solid rgba(255, 215, 0, 0.3); cursor: pointer; font-size: 14px; transition: 0.3s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; width: 100%; }
        .btn-attract:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0, 102, 51, 0.5); }
        .btn-attract.warning { background: linear-gradient(135deg, #fb8c00, #ef6c00); }
        .btn-attract.danger { background: linear-gradient(135deg, #d32f2f, #b71c1c); }
        
        .select-input { padding: 12px; border-radius: 10px; border: 2px solid #eee; font-size: 15px; outline: none; }
        .table-container { width: 100%; overflow-x: auto; border-radius: 10px; margin-top: 20px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; }
        th { background: var(--forest); color: white; text-transform: uppercase; padding: 12px; font-size: 11px; font-weight: 800; text-align: center; }
        th:first-child { border-top-left-radius: 10px; text-align: left; width: 40%; }
        th:last-child { border-top-right-radius: 10px; }
        td { padding: 12px; text-align: center; border-bottom: 1px solid #eee; font-size: 13px; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; padding: 25px 0; background: white; display: flex; justify-content: center; z-index: 1000; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div id="loginScreen" class="overlay-screen">
    <div class="auth-box">
        <i class="fas fa-user-shield secure-icon"></i>
        <h2 class="auth-title">Admin Access</h2>
        <input type="password" id="adminPass" class="auth-input" placeholder="Admin Password">
        <button onclick="login()" class="btn-attract">Unlock Dashboard <i class="fas fa-unlock-alt"></i></button>
        <div class="auth-links">
            <span onclick="window.location.href='index.html'">Cancel & Return</span>
            <span onclick="openRecovery()">Forgot Password?</span>
        </div>
    </div>
</div>

<div id="recoveryScreen" class="overlay-screen" style="display:none;">
    <div class="auth-box" style="border-bottom-color: var(--gold);">
        <i class="fas fa-key secure-icon" style="color: var(--gold);"></i>
        <h2 class="auth-title">Password Reset</h2>
        <input type="password" id="masterKey" class="auth-input" placeholder="Enter Master Key">
        <input type="password" id="newPass" class="auth-input" placeholder="New Admin Password">
        <button onclick="recoverPass()" class="btn-attract">Update Password</button>
        <span class="auth-links" style="margin-top:15px; cursor:pointer; text-decoration:underline;" onclick="closeRecovery()">Back to Login</span>
    </div>
</div>

<div id="mainApp" style="display:none;">
    <header>
        <div class="header-content">
            <div class="header-left">
                <div class="admin-access-box">
                    <img src="logo.png" class="header-logo" alt="Logo" onerror="this.style.display='none'">
                    <i class="fas fa-user-shield shield-icon"></i>
                    <div class="school-text">
                        <span class="school-name-main">PARAMOUNT SCHOOL</span>
                        <span class="admin-label">Admin Dashboard</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="card" style="border-top-color: var(--gold);">
            <h3><i class="fas fa-bullhorn"></i> School Broadcast</h3>
            <textarea id="annMsg" style="width:100%; height:100px; padding:15px; border-radius:12px; border:2px solid #eee; outline:none; margin-bottom:15px; resize:none;" placeholder="Broadcast message for teachers..."></textarea>
            <div style="display:flex; gap:12px;">
                <button onclick="postAnn()" class="btn-attract">Publish Now</button>
                <button onclick="clearAnn()" style="background:#eee; color:#666; border:none; padding:14px 25px; border-radius:50px; font-weight:bold; cursor:pointer; flex:0.3;">Clear</button>
            </div>
        </div>

        <div class="card">
            <h3><i class="fas fa-calendar-check"></i> Attendance Monitoring</h3>
            <div style="display:flex; flex-direction:column; gap:15px; margin-bottom:25px;">
                <div style="display:flex; gap:10px; flex-wrap:wrap;">
                    <select id="clsPick" class="select-input" style="flex:1;">
                        <option value="">-- Choose Class --</option>
                        <option value="Pre-KG">Pre-KG</option><option value="KG-1">KG-1</option><option value="KG-2">KG-2</option>
                        <option value="Grade-1">Grade-1</option><option value="Grade-2">Grade-2</option><option value="Grade-3">Grade-3</option>
                        <option value="Grade-4">Grade-4</option><option value="Grade-5">Grade-5</option><option value="Grade-6">Grade-6</option>
                        <option value="Grade-7">Grade-7</option><option value="Grade-8">Grade-8</option>
                    </select>
                    <select id="viewType" class="select-input" onchange="toggleFilterInputs()" style="flex:1;">
                        <option value="total">Overall Totals</option>
                        <option value="monthly">Monthly Breakdown</option>
                        <option value="daily">Specific Date</option>
                    </select>
                </div>
                <div id="monthlyFilter" style="display:none;"><input type="month" id="monthInput" class="auth-input" style="margin:0; width:100%;"></div>
                <div id="dailyFilter" style="display:none;"><input type="date" id="dateInput" class="auth-input" style="margin:0; width:100%;"></div>

                <div style="display:flex; gap:10px;">
                    <button onclick="viewAtt()" class="btn-attract" style="flex:1;">View Report</button>
                    <button onclick="downloadFilteredReport()" id="dlBtn" class="btn-attract warning" style="display:none; flex:1;">Export Excel</button>
                </div>
            </div>
            <div class="table-container">
                <table id="resultsTable">
                    <thead id="tableHead"><tr><th>Student</th><th>P</th><th>A</th><th>Total</th><th>%</th></tr></thead>
                    <tbody id="attBody"></tbody>
                </table>
            </div>
        </div>

        <div class="card" style="border-top-color: var(--danger);">
            <h3><i class="fas fa-tools"></i> System Maintenance</h3>
            <div style="display: grid; gap: 10px;">
                <button onclick="resetMonthlyData()" class="btn-attract warning">Reset Monthly Stats Only</button>
                <button onclick="resetAttendanceData()" class="btn-attract danger">Master Database Reset</button>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <button onclick="window.location.href='attendance.html'" class="btn-attract" style="width: 90%; max-width: 400px; background: #2196f3;">
            <i class="fas fa-arrow-left"></i> Open Teacher Portal
        </button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDRYk9KOK-ga0c88dnYMsAoifW2NJTd_Y8", databaseURL: "https://paramount-school-d55bc-default-rtdb.firebaseio.com", projectId: "paramount-school-d55bc" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function openRecovery() { document.getElementById('loginScreen').style.display='none'; document.getElementById('recoveryScreen').style.display='flex'; }
    function closeRecovery() { document.getElementById('recoveryScreen').style.display='none'; document.getElementById('loginScreen').style.display='flex'; }

    async function login() {
        const snap = await db.ref('admin/password').once('value');
        const correct = snap.val() || "Ahmad@07";
        if(document.getElementById('adminPass').value === correct) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
        } else { Swal.fire('Error', 'Wrong Password', 'error'); }
    }

    function recoverPass() {
        if(document.getElementById('masterKey').value === "paramount") {
            db.ref('admin/password').set(document.getElementById('newPass').value).then(() => {
                Swal.fire('Success', 'Password Updated!', 'success');
                closeRecovery();
            });
        } else { Swal.fire('Error', 'Invalid Master Key', 'error'); }
    }

    function toggleFilterInputs() {
        const type = document.getElementById('viewType').value;
        document.getElementById('monthlyFilter').style.display = (type === 'monthly') ? 'block' : 'none';
        document.getElementById('dailyFilter').style.display = (type === 'daily') ? 'block' : 'none';
    }

    function postAnn() { db.ref('announcement').set(document.getElementById('annMsg').value).then(() => Swal.fire('Published', '', 'success')); }
    function clearAnn() { db.ref('announcement').remove().then(() => { document.getElementById('annMsg').value = ""; Swal.fire('Cleared', '', 'info'); }); }

    async function viewAtt() {
        const cls = document.getElementById('clsPick').value;
        const type = document.getElementById('viewType').value;
        const body = document.getElementById('attBody');
        if(!cls) return Swal.fire('Error', 'Pick a class', 'info');
        body.innerHTML = 'Loading...';

        if(type === 'daily') {
            const date = document.getElementById('dateInput').value;
            db.ref(`daily_attendance/${date}/${cls}`).once('value', (snap) => {
                const data = snap.val(); body.innerHTML = "";
                if(!data) return body.innerHTML = 'No records';
                document.getElementById('dlBtn').style.display = 'inline-flex';
                for(let n in data) { body.innerHTML += `<tr><td>${n}</td><td colspan="4">${data[n] ? 'PRESENT' : 'ABSENT'}</td></tr>`; }
            });
        } else {
            db.ref(`attendance/${cls}/students`).once('value', (snap) => {
                const data = snap.val(); body.innerHTML = "";
                if(!data) return body.innerHTML = 'No data';
                document.getElementById('dlBtn').style.display = 'inline-flex';
                for(let n in data) {
                    let p=0, t=0;
                    if(type === 'monthly') {
                        const m = document.getElementById('monthInput').value;
                        const mD = (data[n].months && data[n].months[m]) ? data[n].months[m] : {present:0, total:0};
                        p = mD.present; t = mD.total;
                    } else { if (data[n].months) Object.values(data[n].months).forEach(v => { p += v.present; t += v.total; }); }
                    body.innerHTML += `<tr><td>${n}</td><td>${p}</td><td>${t-p}</td><td>${t}</td><td>${t>0?Math.round(p/t*100):0}%</td></tr>`;
                }
            });
        }
    }

    async function resetAttendanceData() {
        const { isConfirmed } = await Swal.fire({ title: 'MASTER RESET', text: "Clear all logs?", icon: 'warning', showCancelButton: true });
        if(isConfirmed) { db.ref('attendance').remove(); db.ref('daily_attendance').remove(); Swal.fire('Success', '', 'success'); }
    }
    
    async function resetMonthlyData() {
        const m = document.getElementById('monthInput').value;
        if(!m) return Swal.fire('Error', 'Pick month', 'info');
        const updates = {};
        const snap = await db.ref('attendance').once('value');
        if (snap.val()) Object.keys(snap.val()).forEach(c => { const st = snap.val()[c].students; if(st) Object.keys(st).forEach(n => updates[`attendance/${c}/students/${n}/months/${m}`] = null); });
        await db.ref().update(updates); Swal.fire('Cleared', '', 'success');
    }

    document.getElementById('monthInput').value = new Date().toISOString().slice(0, 7);
</script>
</body>
</html>
