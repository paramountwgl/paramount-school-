<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Dashboard | Paramount School</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --forest: #006633; --gold: #ffd700; --danger: #c62828; --light: #f4f7f6; }
        * { box-sizing: border-box; } 
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding-bottom: 120px; overflow-x: hidden; }
        
        .overlay-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--light); z-index: 9999; display: flex; justify-content: center; align-items: center; padding: 15px; }
        .auth-box { background: white; padding: 40px 25px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 400px; border-bottom: 5px solid var(--forest); text-align: center; }
        .auth-input { width: 100%; padding: 12px; margin: 20px 0; border: 2px solid #eee; border-radius: 10px; text-align: center; font-size: 16px; outline: none; }

        /* MATCHING IMAGE HEADER STYLING */
        header { background: var(--forest); color: white; padding: 25px 5%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; }
        .header-content { display: flex; align-items: center; justify-content: center; max-width: 1400px; margin: 0 auto; width: 100%; gap: 20px; }
        
        .header-logo { height: clamp(60px, 8vw, 85px); width: auto; flex-shrink: 0; }
        
        /* VERTICAL DIVIDER LINE */
        .divider { width: 2px; height: 50px; background-color: rgba(255, 255, 255, 0.3); flex-shrink: 0; }

        .school-branding { display: flex; flex-direction: column; line-height: 1; }
        .school-name-main { font-family: 'Montserrat', sans-serif; font-size: clamp(1.4rem, 4vw, 2.4rem); font-weight: 800; letter-spacing: 1px; }
        .school-name-sub { font-family: 'Montserrat', sans-serif; font-size: clamp(0.7rem, 2vw, 1rem); color: var(--gold); font-weight: 700; text-transform: uppercase; margin-top: 5px; }
        
        .admin-portal-text { font-family: 'Montserrat', sans-serif; font-size: clamp(1.2rem, 3.5vw, 2.2rem); font-weight: 800; text-transform: uppercase; white-space: nowrap; }

        /* DASHBOARD CONTENT */
        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 30px; border-top: 8px solid var(--forest); }
        h3 { color: var(--forest); margin: 0 0 25px; font-size: 1.4rem; display: flex; align-items: center; gap: 12px; border-bottom: 2px solid #f0f0f0; padding-bottom: 15px; }
        
        .btn-admin { background: linear-gradient(135deg, var(--forest), #004d26); color: white; padding: 15px 30px; border-radius: 50px; font-weight: bold; border: none; cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; justify-content: center; gap: 10px; width: 100%; margin-top: 15px; font-size: 16px; }
        .btn-admin:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0, 102, 51, 0.3); }
        .btn-admin.danger { background: linear-gradient(135deg, #d32f2f, #b71c1c); }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; padding: 25px; background: white; border-top: 1px solid #eee; display: flex; justify-content: center; z-index: 1000; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div id="loginScreen" class="overlay-screen">
    <div class="auth-box">
        <i class="fas fa-user-shield secure-icon" style="font-size: 50px; color: var(--forest); margin-bottom: 20px;"></i>
        <h2 class="auth-title">Admin Access</h2>
        <input type="password" id="adminPass" class="auth-input" placeholder="Enter Password">
        <button onclick="login()" class="btn-admin">Unlock Dashboard</button>
    </div>
</div>

<div id="mainApp" style="display:none;">
    <header>
        <div class="header-content">
            <img src="logo.png" class="header-logo" alt="Logo">
            
            <div class="divider"></div>

            <div class="school-branding">
                <span class="school-name-main">PARAMOUNT</span>
                <span class="school-name-sub">ENGLISH MEDIUM SCHOOL</span>
            </div>

            <div class="divider"></div>

            <div class="admin-portal-text">ADMIN PORTAL</div>
        </div>
    </header>

    <div class="container">
        <div class="card" style="border-top-color: var(--gold);">
            <h3><i class="fas fa-bullhorn" style="color:var(--gold);"></i> Announcement Control</h3>
            <textarea id="annMsg" style="width:100%; height:120px; padding:20px; border-radius:15px; border:2px solid #eee; outline:none; margin-bottom:15px; resize:none; font-size: 16px;" placeholder="Type school announcement here..."></textarea>
            <div style="display:flex; gap:15px;">
                <button onclick="postAnn()" class="btn-admin">Publish Now <i class="fas fa-check-circle"></i></button>
                <button onclick="document.getElementById('annMsg').value=''" style="background:#f5f5f5; color:#666; border:none; padding:15px 30px; border-radius:50px; font-weight:bold; cursor:pointer; flex:0.4;">Clear</button>
            </div>
        </div>

        <div class="card">
            <h3><i class="fas fa-calendar-check"></i> Attendance Monitoring</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:20px;">
                <select id="clsPick" style="padding:15px; border-radius:12px; border:2px solid #eee; font-size: 15px;">
                    <option value="">-- Choose Class --</option>
                    <option value="Pre-KG">Pre-KG</option><option value="KG-1">KG-1</option><option value="KG-2">KG-2</option>
                    <option value="Grade-1">Grade-1</option><option value="Grade-2">Grade-2</option><option value="Grade-3">Grade-3</option>
                    <option value="Grade-4">Grade-4</option><option value="Grade-5">Grade-5</option><option value="Grade-6">Grade-6</option>
                    <option value="Grade-7">Grade-7</option><option value="Grade-8">Grade-8</option>
                </select>
                <input type="month" id="monthInput" style="padding:15px; border-radius:12px; border:2px solid #eee; font-size: 15px;">
            </div>
            <button onclick="viewAtt()" class="btn-admin" style="background:#2196f3;">View Report <i class="fas fa-search"></i></button>
            <div id="attBody" style="margin-top:20px;"></div>
        </div>

        <div class="card" style="border-top-color: var(--danger);">
            <h3><i class="fas fa-tools"></i> System Maintenance</h3>
            <button onclick="resetData()" class="btn-admin danger">Master Database Reset <i class="fas fa-trash-alt"></i></button>
        </div>
    </div>

    <div class="bottom-nav">
        <button onclick="window.location.href='attendance.html'" class="btn-admin" style="width: 90%; max-width: 450px; background: #2196f3;">
            <i class="fas fa-arrow-left"></i> Return to Teacher Portal
        </button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDRYk9KOK-ga0c88dnYMsAoifW2NJTd_Y8", databaseURL: "https://paramount-school-d55bc-default-rtdb.firebaseio.com", projectId: "paramount-school-d55bc" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function login() {
        if(document.getElementById('adminPass').value === "Ahmad@07") {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
        } else { Swal.fire('Error', 'Wrong Password', 'error'); }
    }

    function postAnn() { 
        const msg = document.getElementById('annMsg').value;
        if(!msg) return Swal.fire('Empty', 'Enter a message first', 'warning');
        db.ref('announcement').set(msg).then(() => Swal.fire('Published', 'Message is now live', 'success')); 
    }

    async function viewAtt() {
        const cls = document.getElementById('clsPick').value;
        const month = document.getElementById('monthInput').value;
        if(!cls || !month) return Swal.fire('Select Both', 'Pick class and month', 'info');
        const body = document.getElementById('attBody');
        body.innerHTML = 'Fetching records...';
        db.ref(`attendance/${cls}/students`).once('value', (snap) => {
            const data = snap.val(); body.innerHTML = "";
            if(!data) return body.innerHTML = 'No records found.';
            for(let name in data) {
                const mData = (data[name].months && data[name].months[month]) ? data[name].months[month] : {present:0, total:0};
                body.innerHTML += `<div style="padding:10px; border-bottom:1px solid #eee;"><b>${name}</b>: ${mData.present} / ${mData.total} days</div>`;
            }
        });
    }

    async function resetData() {
        const { isConfirmed } = await Swal.fire({ title: 'MASTER RESET', text: 'Delete everything?', icon: 'warning', showCancelButton: true });
        if(isConfirmed) { db.ref().remove().then(() => location.reload()); }
    }

    document.getElementById('monthInput').value = new Date().toISOString().slice(0, 7);
</script>
</body>
</html>
