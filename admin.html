<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Paramount School</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
     <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --forest: #006633; --gold: #ffd700; --danger: #c62828; --light: #f4f7f6; }
        * { box-sizing: border-box; } 
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding-bottom: 120px; overflow-x: hidden; }
        
        /* RESPONSIVE LOGIN BOX */
        .overlay-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--light); z-index: 9999; display: flex; justify-content: center; align-items: center; padding: 15px; }
        .auth-box { background: white; padding: 40px 25px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 400px; border-bottom: 5px solid var(--forest); position: relative; text-align: center; }
        .auth-logo-corner { position: absolute; top: 15px; left: 15px; height: 40px; width: auto; }
        .secure-icon { font-size: 50px; color: var(--forest); margin: 15px auto; display: block; }
        .auth-title { color: var(--forest); font-family: 'Montserrat', sans-serif; font-size: 1.5rem; font-weight: 800; margin-bottom: 20px; }
        .auth-input { width: 100%; padding: 14px; border-radius: 10px; border: 2px solid #eee; margin-bottom: 20px; text-align: center; font-size: 16px; outline: none; }

        /* RESPONSIVE HEADER BRANDING */
        header { background: var(--forest); color: white; padding: 25px 5%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header-content { display: flex; align-items: center; justify-content: center; gap: 20px; max-width: 1400px; margin: 0 auto; flex-wrap: wrap; }
        .header-logo { height: 75px; width: auto; }
        .school-branding-group { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; justify-content: center; }
        .school-text { display: flex; flex-direction: column; line-height: 1.1; text-align: center; }
        .school-name-main { font-family: 'Montserrat', sans-serif; font-size: clamp(1.8rem, 5vw, 2.5rem); font-weight: 800; }
        .school-name-sub { font-family: 'Montserrat', sans-serif; font-size: clamp(0.8rem, 3vw, 1.1rem); color: var(--gold); font-weight: 700; margin-top: 2px; }
        .admin-portal-heading { font-family: 'Montserrat', sans-serif; font-size: clamp(1.8rem, 5vw, 2.5rem); font-weight: 800; color: var(--gold); border-left: 4px solid var(--gold); padding-left: 20px; text-transform: uppercase; }

        .container { max-width: 900px; margin: 20px auto; padding: 0 15px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 25px; border-top: 6px solid var(--forest); }
        h3 { color: var(--forest); margin: 0 0 15px; font-size: 1.3rem; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        
        textarea { width: 100%; height: 110px; padding: 15px; border-radius: 10px; border: 2px solid #eee; outline: none; margin-bottom: 15px; resize: none; font-size: 16px; }

        /* BUTTONS OPTIMIZED FOR TOUCH */
        .btn-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .btn-small { background: var(--forest); color: white; padding: 12px 30px; border-radius: 50px; font-weight: bold; border: none; cursor: pointer; font-size: 14px; transition: 0.3s; min-width: 120px; }
        .btn-small.clear { background: #eee; color: #666; }

        /* MOBILE-FRIENDLY INLINE ACTION */
        .inline-action { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; margin-bottom: 20px; flex-wrap: wrap; }
        .class-select { flex: 1; min-width: 200px; padding: 12px; border-radius: 8px; border: 2px solid #eee; font-size: 15px; }

        /* RESPONSIVE TABLE */
        .table-container { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: var(--forest); color: white; font-size: 12px; text-transform: uppercase; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; padding: 20px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); display: flex; justify-content: center; z-index: 1000; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); }

        /* MOBILE SPECIFIC ADJUSTMENTS */
        @media (max-width: 600px) {
            .admin-portal-heading { border-left: none; padding-left: 0; border-top: 2px solid var(--gold); padding-top: 10px; margin-top: 10px; }
            .school-branding-group { flex-direction: column; }
            .auth-box { padding: 30px 15px; }
        }
    </style>
</head>
<body>

<div id="loginScreen" class="overlay-screen">
    <div class="auth-box">
        <img src="logo.png" class="auth-logo-corner" onerror="this.style.display='none'">
        <i class="fas fa-user-shield secure-icon"></i>
        <h2 class="auth-title">Admin Access</h2>
        <input type="password" id="adminPass" class="auth-input" placeholder="Admin Password">
        <button onclick="login()" class="btn-small" style="width:100%; font-size: 16px;">Unlock Dashboard</button>
    </div>
</div>

<div id="resetDataScreen" class="overlay-screen" style="display:none;">
    <div class="auth-box" style="border-bottom-color: var(--danger);">
        <i class="fas fa-exclamation-triangle" style="font-size: 50px; color: var(--danger); margin-bottom: 15px;"></i>
        <h2 style="color: var(--danger); font-family: 'Montserrat';">Confirm Wipe</h2>
        <input type="password" id="confirmResetPass" class="auth-input" placeholder="Verify Admin Password">
        <button onclick="finalReset()" class="btn-small" style="background: var(--danger); width:100%;">Clear All Data</button>
        <button onclick="document.getElementById('resetDataScreen').style.display='none'" class="btn-small clear" style="margin-top:10px; width:100%;">Cancel</button>
    </div>
</div>

<div id="mainApp" style="display:none;">
    <header>
        <div class="header-content">
            <img src="logo.png" class="header-logo" onerror="this.style.display='none'">
            <div class="school-branding-group">
                <div class="school-text">
                    <span class="school-name-main">PARAMOUNT</span>
                    <span class="school-name-sub">ENGLISH MEDIUM SCHOOL</span>
                </div>
                <h1 class="admin-portal-heading">Admin Portal</h1>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="card" style="border-top-color: var(--gold);">
            <h3><i class="fas fa-bullhorn"></i> Announcement Control</h3>
            <textarea id="annMsg" placeholder="Type school announcement here..."></textarea>
            <div class="btn-row">
                <button onclick="postAnn()" class="btn-small">Publish Now</button>
                <button onclick="clearAnn()" class="btn-small clear">Clear</button>
            </div>
        </div>

        <div class="card">
            <h3><i class="fas fa-calendar-check"></i> Attendance Tracking</h3>
            <div class="inline-action">
                <select id="clsPick" class="class-select">
                    <option value="">-- Choose Class --</option>
                    <option value="Pre-KG">Pre-KG (Diamond)</option><option value="KG-1">KG-1 (Ruby)</option><option value="KG-2">KG-2 (Amber)</option>
                    <option value="Grade-1">Grade-1 (Opal)</option><option value="Grade-2">Grade-2 (Emerald)</option><option value="Grade-3">Grade-3 (Crystal)</option>
                    <option value="Grade-4">Grade-4 (Citrine)</option><option value="Grade-5">Grade-5 (Moonstone)</option><option value="Grade-6">Grade-6 (Alluri)</option>
                    <option value="Grade-7">Grade-7 (Kalam)</option><option value="Grade-8">Grade-8 (Bhagat)</option>
                </select>
                <button onclick="viewAtt()" class="btn-small">View Report</button>
            </div>
            <div class="table-container">
                <table id="attTable">
                    <thead><tr><th>Student Name</th><th>P</th><th>A</th><th>Total</th><th>%</th></tr></thead>
                    <tbody id="attBody"></tbody>
                </table>
            </div>
            <div style="text-align: center;">
                <button onclick="document.getElementById('resetDataScreen').style.display='flex'" class="btn-small" style="background: var(--danger); margin-top: 30px;">
                    <i class="fas fa-trash-alt" style="margin-right: 8px;"></i> Reset All Attendance Data
                </button>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <button onclick="window.location.href='index.html'" class="btn-small" style="padding: 15px 40px; width: 100%; max-width: 400px;">
            <i class="fas fa-arrow-left" style="margin-right: 12px;"></i> Return to Attendance Portal
        </button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyDRYk9KOK-ga0c88dnYMsAoifW2NJTd_Y8", databaseURL: "https://paramount-school-d55bc-default-rtdb.firebaseio.com", projectId: "paramount-school-d55bc" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function login() {
        if(document.getElementById('adminPass').value === "Ahmad@07") {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
        } else { Swal.fire('Error', 'Incorrect Password', 'error'); }
    }

    function postAnn() { 
        const msg = document.getElementById('annMsg').value;
        if(msg) db.ref('announcement').set(msg).then(() => Swal.fire('Success', 'Published', 'success')); 
    }
    
    function clearAnn() { 
        db.ref('announcement').remove().then(() => {
            document.getElementById('annMsg').value = "";
            Swal.fire('Info', 'Cleared', 'info');
        });
    }

    function finalReset() {
        if(document.getElementById('confirmResetPass').value === "Ahmad@07") {
            db.ref('attendance').remove().then(() => {
                Swal.fire('Success', 'All records cleared.', 'success');
                setTimeout(() => location.reload(), 1500);
            });
        } else { Swal.fire('Error', 'Incorrect Password', 'error'); }
    }

    function viewAtt() {
        const cls = document.getElementById('clsPick').value;
        const body = document.getElementById('attBody');
        if(!cls) return;
        body.innerHTML = '<tr><td colspan="5" style="text-align:center;">Loading...</td></tr>';
        db.ref(`attendance/${cls}/students`).once('value', (snap) => {
            const data = snap.val(); body.innerHTML = "";
            if(!data) return body.innerHTML = '<tr><td colspan="5" style="text-align:center;">No records found.</td></tr>';
            for(let name in data) {
                const p = data[name].presentDays || 0; const t = data[name].totalDays || 0;
                body.innerHTML += `<tr><td>${name}</td><td>${p}</td><td>${t-p}</td><td>${t}</td><td>${t>0?Math.round((p/t)*100):0}%</td></tr>`;
            }
        });
    }
</script>
</body>
</html>
