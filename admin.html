<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Dashboard | Paramount School</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">

    <link rel="icon" type="image/png" href="logo.png">

        * { box-sizing: border-box; } 
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding-bottom: 120px; overflow-x: hidden; }
        
        /* AUTH SCREEN */
        .overlay-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--light); z-index: 1000; display: flex; justify-content: center; align-items: center; padding: 15px; }
        .auth-box { background: white; padding: 40px 25px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 420px; border-bottom: 5px solid var(--forest); text-align: center; }
        .auth-logo { height: 75px; margin-bottom: 15px; }
        .auth-input { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #eee; margin-bottom: 15px; text-align: center; font-size: 16px; outline: none; }
        .auth-links { margin-top: 15px; display: flex; flex-direction: column; gap: 10px; }
        .auth-links span { color: #666; font-size: 13px; text-decoration: underline; cursor: pointer; font-weight: 600; }

        /* HEADER */
        header { background: var(--forest); color: white; padding: 20px 3%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 50; }
        .header-content { display: flex; align-items: center; justify-content: center; max-width: 1400px; margin: 0 auto; gap: 15px; }
        .school-name-main { font-family: 'Montserrat', sans-serif; font-size: clamp(1.1rem, 3vw, 1.8rem); font-weight: 800; }
        .admin-portal-text { font-family: 'Montserrat', sans-serif; font-size: clamp(0.9rem, 2.5vw, 1.5rem); font-weight: 800; color: var(--gold); }

        .container { max-width: 900px; margin: 20px auto; padding: 0 10px; }
        .card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 20px; border-top: 6px solid var(--forest); }
        h3 { color: var(--forest); margin: 0 0 15px; font-size: 1.1rem; border-bottom: 1px solid #eee; padding-bottom: 10px; display: flex; align-items: center; gap: 8px; }

        /* 360 TOOLS UI */
        .search-card { background: white; padding: 12px; border-radius: 50px; display: flex; border: 2px solid var(--gold); margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .search-card input { flex: 1; border: none; outline: none; padding-left: 20px; font-weight: bold; border-radius: 50px; font-size: 16px; }
        
        #dashboard360 { display: none; }
        .v-profile { display: flex; gap: 20px; align-items: flex-start; margin-bottom: 20px; }
        /* NO BORDER CIRCULAR PHOTO */
        .v-photo-container { width: 110px; height: 110px; border-radius: 50%; overflow: hidden; background: #eee; flex-shrink: 0; border: none !important; }
        .v-photo { width: 100%; height: 100%; object-fit: cover; }
        
        .v-details { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; flex: 1; text-align: left; }
        .v-item span { font-size: 13px; font-weight: 700; color: #333; }
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; text-align: center; }
        .stat-box { background: var(--light); padding: 10px; border-radius: 12px; border: 1px solid #eee; }
        
        .fee-bar-bg { width: 100%; height: 30px; background: #eee; border-radius: 50px; overflow: hidden; margin: 10px 0; position: relative; }
        .fee-bar-fill { height: 100%; background: linear-gradient(to right, var(--forest), #00b359); width: 0%; transition: 1.5s; }
        .fee-label { position: absolute; width: 100%; text-align: center; line-height: 30px; font-weight: 900; font-size: 11px; z-index: 2; color: #333; }

        .marks-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .marks-table td { padding: 10px; border-bottom: 1px solid #f0f0f0; font-size: 13px; font-weight: 700; text-align: center; }
        .hw-box { background: #fffde7; padding: 15px; border-radius: 10px; border-left: 5px solid #fbc02d; font-style: italic; text-align: left; }

        /* TOOLS */
        .btn-attract { background: linear-gradient(135deg, var(--forest), #004d26); color: white; padding: 12px; border-radius: 50px; font-weight: bold; border: 2px solid var(--gold); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; padding: 15px; background: white; display: flex; justify-content: center; z-index: 50; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); }
        .btn-premium { background: var(--forest); color: white; padding: 14px 30px; border-radius: 60px; font-weight: 800; text-decoration: none; border: 2px solid var(--gold); display: flex; align-items: center; gap: 10px; }
        .filter-row { display: flex; gap: 8px; align-items: center; margin-top: 10px; }
        .filter-row select, .filter-row input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ddd; }
    </style>
</head>

<div id="loginScreen" class="overlay-screen">
    <div class="auth-box">
        <img src="logo.png" class="auth-logo">
        <h2 style="font-family: Montserrat; color:var(--forest);">PARAMOUNT</h2>
        <input type="password" id="adminPass" class="auth-input" placeholder="Admin Password">
        <button onclick="login()" class="btn-attract" style="height:50px; width:100%"><i class="fas fa-unlock"></i> UNLOCK DASHBOARD</button>
        <div class="auth-links">
            <span onclick="window.location.href='index.html'">Cancel & Return</span>
            <span onclick="openRecovery()">Forgot Password?</span>
        </div>
    </div>
</div>

<div id="recoveryScreen" class="overlay-screen" style="display:none;">
    <div class="auth-box">
        <h2>Recovery</h2>
        <input type="password" id="masterKey" class="auth-input" placeholder="Master Key">
        <input type="password" id="newPass" class="auth-input" placeholder="New Password">
        <button onclick="recoverPass()" class="btn-attract">Update Password</button>
        <div class="auth-links"><span onclick="closeRecovery()">Back</span></div>
    </div>
</div>

<div id="mainApp" style="display:none;">

        </div>

            <div class="card" style="border-top-color: var(--sky);">

            <div class="card" style="border-top-color: #fbc02d;">

</div>

// 360° SEARCH ENGINE INTEGRATED
async function search360() {
    const roll = document.getElementById('rollSearch').value.trim();
    const s = studentData[roll];
    if(!s) return Swal.fire('Error','Roll Not Found','warning');

    // UI Reset
    document.getElementById('dashboard360').style.display = 'block';
    document.getElementById('vMarksBody').innerHTML = '<tr><td colspan="3">Syncing...</td></tr>';
    document.getElementById('vBadges').innerHTML = "";
    document.getElementById('vFeeFill').style.width = "0%";

    document.getElementById('vName').innerText = s.Name;
    document.getElementById('vClass').innerText = s.Class;
    document.getElementById('vRoll').innerText = roll;
    document.getElementById('vPhone').innerText = s.Phonenumber;
    
    // CIRCULAR IMAGE FIXED
    const ts = new Date().getTime();
    document.getElementById('vPhoto').src = `Student images/${roll}.png?v=${ts}`;

    const name = s.Name; 
    const fullClass = s.Class;
    const shortClass = s.Class.split(" ")[0]; 

    // 1. ATTENDANCE
    db.ref('daily_attendance').once('value', snap => {
        const data = snap.val() || {};
        let p=0, t=0;
        Object.keys(data).forEach(d => {
            const cp = data[d][shortClass] || data[d][fullClass];
            if(cp && cp[name] !== undefined) { t++; if(cp[name] === true) p++; }
        });
        document.getElementById('vTotal').innerText = t;
        document.getElementById('vPres').innerText = p;
        document.getElementById('vAbs').innerText = t-p;
        document.getElementById('vAttPct').innerText = `Attendance: ${t>0?Math.round((p/t)*100):0}%`;
    });

    // 2. MARKS SYNC
    db.ref(`exam_results`).once('value', snap => {
        const all = snap.val() || {};
        const res = (all[fullClass] && all[fullClass][name]) || (all[shortClass] && all[shortClass][name]);
        const body = document.getElementById('vMarksBody');
        const subjects = classSubjects[shortClass] || ["English", "Maths"];
        body.innerHTML = "";

        if(res && res.subjects) {
            subjects.forEach(sub => {
                const mk = res.subjects[sub] || "---";
                const gr = mk === "---" ? "---" : (mk >= 75 ? 'A' : (mk >= 50 ? 'B' : 'C'));
                body.innerHTML += `<tr><td>${sub}</td><td>${mk}</td><td>${gr}</td></tr>`;
            });
            if(res.badge) document.getElementById('vBadges').innerHTML = `<span style="background:var(--gold); padding:4px 12px; border-radius:50px; font-size:10px; font-weight:900; color:black;">${res.badge}</span>`;
        } else { body.innerHTML = '<tr><td colspan="3">No marks found.</td></tr>'; }
    });

    // 3. HOMEWORK RESTORED
    const today = new Date().toISOString().split('T')[0];
    db.ref(`homework`).once('value', snap => {
        const hData = snap.val() || {};
        const hw = hData[fullClass] || hData[shortClass];
        document.getElementById('vHW').innerText = (hw && hw[today]) ? hw[today] : "No homework assigned.";
    });

    // 4. FEES
    db.ref(`fee_records`).once('value', snap => {
        const allFees = snap.val() || {};
        const sFees = (allFees[fullClass] && allFees[fullClass][name]) || (allFees[shortClass] && allFees[shortClass][name]);
        if(sFees) {
            const entry = Object.values(sFees).pop();
            const total = parseFloat(entry.total) || 0;
            const paid = parseFloat(entry.paid) || 0;
            document.getElementById('vFeeFill').style.width = total > 0 ? (paid/total*100)+"%" : "0%";
            document.getElementById('vFeeLabel').innerText = total > 0 ? Math.round(paid/total*100)+"%" : "0%";
            document.getElementById('vTotalAmt').innerText = total;
            document.getElementById('vPaid').innerText = paid;
            document.getElementById('vDue').innerText = total - paid;
        }
    });
}

        body.innerHTML = studentDataMaster[cls].map(n => {
            let p=0, t=0;
            Object.keys(allData).forEach(d => { if(allData[d][cls] && allData[d][cls][n] !== undefined) { t++; if(allData[d][cls][n]===true) p++; } });
            return `<tr><td>${n}</td><td>${p}</td><td>${t-p}</td><td>${t}</td><td>${t>0?Math.round((p/t)*100):0}%</td></tr>`;
        }).join('');
    });
}
async function secureReset(m) { const { value: pass } = await Swal.fire({ title: 'Password', input: 'password' }); if(pass === currentAdminPass) { db.ref('daily_attendance').remove(); Swal.fire('Done','','success'); } }
