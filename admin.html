<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Paramount School</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --forest: #006633; --gold: #ffd700; --danger: #c62828; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 0; }
        .overlay-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(244, 247, 246, 0.95); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .auth-box { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 350px; }
        .auth-btn { background: var(--forest); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        header { background: var(--forest); color: white; padding: 20px 5%; display: flex; justify-content: center; align-items: center; gap: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .logo-img { height: 70px; width: auto; }
        .container { max-width: 1000px; margin: 30px auto; padding: 0 15px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 25px; }
        label { display: block; font-size: 12px; font-weight: bold; color: #666; margin-bottom: 5px; text-transform: uppercase; }
        select, input, textarea { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #ddd; font-size: 15px; outline: none; box-sizing: border-box; margin-bottom: 10px; }
        .fetch-btn { background: #006633; color: white; border: none; padding: 0 25px; border-radius: 8px; font-weight: bold; cursor: pointer; height: 48px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: var(--forest); color: white; font-size: 12px; }
        .badge-verified { background: #e8f5e9; color: #2e7d32; padding: 4px 8px; border-radius: 10px; font-size: 10px; font-weight: bold; }
        #mainApp, #resetDataScreen, #manualSubjectGroup { display: none; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

<div id="loginScreen" class="overlay-screen">
    <div class="auth-box">
        <h2 style="color: var(--forest);">Admin Login</h2>
        <input type="password" id="adminPassword" placeholder="Enter Password" onkeypress="if(event.key === 'Enter') checkPassword()">
        <button class="auth-btn" onclick="checkPassword()">Login</button>
        <p id="loginError" style="color: var(--danger); display: none; margin-top: 10px;">Incorrect Password</p>
    </div>
</div>

<div id="mainApp">
    <header>
        <img src="logo.png" alt="Logo" class="logo-img">
        <div class="school-info">
            <h1 style="margin:0; font-size: 1.6rem;">PARAMOUNT ADMIN</h1>
            <p style="color: var(--gold); margin:0; font-weight:bold;">Master Dashboard</p>
        </div>
    </header>

    <div class="container">
        <div class="card" style="border-left: 6px solid var(--gold);">
            <h3><i class="fas fa-bullhorn"></i> Live Cloud Announcement</h3>
            <textarea id="announcementInput" placeholder="Broadcast message..."></textarea>
            <div style="display: flex; gap: 10px;">
                <button onclick="publishAnnouncement()" class="auth-btn" style="flex:1;">Publish</button>
                <button onclick="clearAnnouncement()" class="auth-btn" style="background: var(--danger); width:100px;">Clear</button>
            </div>
        </div>

        <div class="card" style="border-left: 6px solid var(--forest);">
            <h3><i class="fas fa-edit"></i> Post Daily Homework</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div>
                    <label>Date</label>
                    <input type="date" id="hwDate">
                </div>
                <div>
                    <label>Subject</label>
                    <select id="hwSubjectSelect" onchange="toggleManualSubject()">
                        <option value="ENGLISH">English</option>
                        <option value="MATHEMATICS">Mathematics</option>
                        <option value="SCIENCE">Science</option>
                        <option value="SOCIAL STUDIES">Social Studies</option>
                        <option value="TELUGU">Telugu</option>
                        <option value="HINDI">Hindi</option>
                        <option value="COMPUTER">Computer</option>
                        <option value="GK">G.K</option>
                        <option value="OTHER">-- Other (Type Manually) --</option>
                    </select>
                </div>
            </div>
            
            <div id="manualSubjectGroup">
                <label>Type Subject Name</label>
                <input type="text" id="manualSubjectInput" placeholder="Enter Subject Name">
            </div>

            <label>Task Details</label>
            <textarea id="hwTask" style="min-height:70px;" placeholder="Write assignments..."></textarea>
            <button class="auth-btn" onclick="saveHomework()" style="width:auto; padding:12px 30px;"><i class="fas fa-paper-plane"></i> Publish Homework</button>
        </div>

        <div class="card">
            <h3><i class="fas fa-user-check"></i> Parent Verification Tracker</h3>
            <div style="display:flex; gap:10px;">
                <input type="date" id="trackDate" style="flex:1;">
                <button class="auth-btn" onclick="loadVerifications()" style="width:auto; margin:0;">Track</button>
            </div>
            <table id="verifyTable">
                <thead><tr><th>Student</th><th>Subject</th><th>Status</th><th>Time</th></tr></thead>
                <tbody id="verifyBody"></tbody>
            </table>
        </div>

        <div class="card">
            <h3><i class="fas fa-chart-bar"></i> Attendance Records</h3>
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <select id="classSelect" style="flex:1;"><option value="Pre-KG">Pre-KG</option><option value="KG-1">KG-1</option><option value="KG-2">KG-2</option><option value="Grade-1">Grade-1</option><option value="Grade-2">Grade-2</option><option value="Grade-3">Grade-3</option><option value="Grade-4">Grade-4</option><option value="Grade-5">Grade-5</option><option value="Grade-6">Grade-6</option><option value="Grade-7">Grade-7</option><option value="Grade-8">Grade-8</option></select>
                <button class="fetch-btn" onclick="loadAttendance()">View Data</button>
            </div>
            <table id="attTable">
                <thead><tr><th>Student Name</th><th>Present</th><th>Total</th><th>%</th></tr></thead>
                <tbody id="attBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
// --- FIREBASE INITIALIZATION ---
const firebaseConfig = {
  apiKey: "AIzaSyDRYk9KOK-ga0c88dnYMsAoifW2NJTd_Y8",
  databaseURL: "https://paramount-school-d55bc-default-rtdb.firebaseio.com",
  projectId: "paramount-school-d55bc"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function checkPassword() {
    if(document.getElementById('adminPassword').value === "Ahmad@07") {
        document.getElementById('loginScreen').style.display = "none";
        document.getElementById('mainApp').style.display = "block";
    } else { document.getElementById('loginError').style.display = "block"; }
}

// DROPDOWN LOGIC
function toggleManualSubject() {
    const select = document.getElementById('hwSubjectSelect');
    const manualGroup = document.getElementById('manualSubjectGroup');
    manualGroup.style.display = select.value === "OTHER" ? "block" : "none";
}

// SAVE HOMEWORK
function saveHomework() {
    const date = document.getElementById('hwDate').value;
    const select = document.getElementById('hwSubjectSelect');
    let sub = select.value;
    
    if(sub === "OTHER") {
        sub = document.getElementById('manualSubjectInput').value.trim().toUpperCase();
    }
    
    const task = document.getElementById('hwTask').value;
    if(!date || !sub || !task) return alert("Fill all fields");
    
    const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    db.ref(`homework/${date}`).update({ [sub]: task, lastUpdated: now }).then(() => {
        Swal.fire('Posted', 'Diary updated at ' + now, 'success');
        document.getElementById('hwTask').value = "";
    });
}

// VERIFICATION TRACKING
function loadVerifications() {
    const date = document.getElementById('trackDate').value;
    const body = document.getElementById('verifyBody');
    body.innerHTML = '<tr><td colspan="4" style="text-align:center;">Loading...</td></tr>';
    db.ref(`homework_status/${date}`).once('value', (snap) => {
        const data = snap.val(); body.innerHTML = "";
        if(!data) { body.innerHTML = '<tr><td colspan="4" style="text-align:center;">No checks found.</td></tr>'; return; }
        for(let st in data) {
            for(let sub in data[st]) {
                body.innerHTML += `<tr><td>${st}</td><td>${sub}</td><td><span class="badge-verified">VERIFIED</span></td><td>${data[st][sub].verifiedAt}</td></tr>`;
            }
        }
    });
}

// ATTENDANCE
function loadAttendance() {
    const cls = document.getElementById('classSelect').value;
    const body = document.getElementById('attBody');
    body.innerHTML = '<tr><td colspan="4" style="text-align:center;">Fetching...</td></tr>';
    db.ref('attendance').once('value', (snap) => {
        const data = snap.val() || {}; body.innerHTML = "";
        if(!data[cls]) return;
        const students = data[cls].students;
        for(const name in students) {
            const p = students[name].presentDays || 0; const t = students[name].totalDays || 0;
            const pct = t > 0 ? Math.round((p/t)*100) : 0;
            body.innerHTML += `<tr><td>${name}</td><td>${p}</td><td>${t}</td><td>${pct}%</td></tr>`;
        }
    });
}

function publishAnnouncement() {
    const txt = document.getElementById('announcementInput').value;
    db.ref('announcement').set(txt).then(() => Swal.fire('Success', 'Announcement Live!', 'success'));
}
function clearAnnouncement() {
    db.ref('announcement').remove();
}
</script>
</body>
</html>
