<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Dashboard | Paramount School</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --forest: #006633; --gold: #ffd700; --danger: #c62828; --light: #f4f7f6; --sky: #2196f3; }
        * { box-sizing: border-box; } 
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding-bottom: 150px; overflow-x: hidden; }
        
        /* LOGIN BOX - MOBILE OPTIMIZED */
        .overlay-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--light); z-index: 9999; display: flex; justify-content: center; align-items: center; padding: 15px; }
        .auth-box { background: white; padding: 40px 25px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 420px; border-bottom: 5px solid var(--forest); text-align: center; }
        .auth-header-row { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; margin-bottom: 25px; }
        .auth-logo { height: 75px; width: auto; }
        .auth-branding-text h2 { margin: 5px 0 0; font-family: 'Montserrat', sans-serif; font-size: 1.6rem; font-weight: 800; color: var(--forest); }
        .auth-branding-text p { margin: 0; font-size: 0.75rem; font-weight: 700; color: var(--gold); text-transform: uppercase; }
        .auth-input { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #eee; margin-bottom: 15px; text-align: center; font-size: 16px; outline: none; }
        .auth-links { margin-top: 15px; display: flex; flex-direction: column; gap: 10px; }
        .auth-links span { color: #666; font-size: 13px; text-decoration: underline; cursor: pointer; font-weight: 600; }

        /* RESPONSIVE HEADER BRANDING */
        header { background: var(--forest); color: white; padding: 20px 3%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; }
        .header-content { display: flex; align-items: center; justify-content: center; max-width: 1400px; margin: 0 auto; width: 100%; gap: 15px; }
        .header-logo { height: clamp(50px, 8vw, 65px); width: auto; }
        .school-branding { display: flex; flex-direction: column; line-height: 1; text-align: left; }
        .school-name-main { font-family: 'Montserrat', sans-serif; font-size: clamp(1.1rem, 3vw, 2.2rem); font-weight: 800; letter-spacing: 1px; }
        .school-name-sub { font-family: 'Montserrat', sans-serif; font-size: clamp(0.55rem, 1.5vw, 0.9rem); color: var(--gold); font-weight: 700; text-transform: uppercase; }
        .divider-gold { width: 3px; height: 40px; background-color: var(--gold); flex-shrink: 0; margin: 0 5px; border-radius: 5px; }
        .admin-portal-text { font-family: 'Montserrat', sans-serif; font-size: clamp(0.9rem, 2.5vw, 2.2rem); font-weight: 800; text-transform: uppercase; }

        /* MOBILE HEADER ADJUSTMENT */
        @media (max-width: 600px) {
            .header-content { gap: 8px; }
            .divider-gold { height: 30px; width: 2px; }
        }

        /* DASHBOARD UI */
        .container { max-width: 900px; margin: 20px auto; padding: 0 15px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 20px; border-top: 6px solid var(--forest); }
        h3 { color: var(--forest); margin: 0 0 15px; font-size: 1.1rem; border-bottom: 1px solid #eee; padding-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        
        /* PREMIUM BUTTONS */
        .btn-attract { background: linear-gradient(135deg, var(--forest), #004d26); color: white; padding: 12px 20px; border-radius: 50px; font-weight: bold; border: 2px solid var(--gold); cursor: pointer; font-size: 14px; transition: 0.3s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; width: 100%; margin-top: 10px; }
        .btn-view-report { background: linear-gradient(135deg, var(--sky), #1565c0); border-color: white; }
        .btn-attract.warning { background: linear-gradient(135deg, #fb8c00, #ef6c00); border-color: white; }
        .btn-attract.danger { background: linear-gradient(135deg, #d32f2f, #b71c1c); border-color: white; }

        /* RESPONSIVE FILTER ROWS */
        .filter-row { display: flex; gap: 10px; align-items: center; margin-top: 10px; width: 100%; flex-wrap: wrap; }
        .filter-row input, .filter-row select { flex: 1; min-width: 150px; }
        
        /* TABLE OPTIMIZATION */
        .table-container { width: 100%; overflow-x: auto; border-radius: 10px; margin-top: 20px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { background: var(--forest); color: white; padding: 10px; text-transform: uppercase; text-align: center; font-size: 10px; }
        td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; font-size: 12px; }

        /* STICKY BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; padding: 15px; background: white; display: flex; justify-content: center; z-index: 1000; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); }
        .btn-premium { background: linear-gradient(135deg, #004d26, var(--forest)); color: white; padding: 14px 30px; border-radius: 60px; font-weight: 800; text-decoration: none; font-size: 14px; border: 2px solid var(--gold); transition: 0.3s; display: inline-flex; align-items: center; gap: 10px; box-shadow: 0 8px 20px rgba(0, 102, 51, 0.3); text-align: center; width: 90%; max-width: 400px; justify-content: center; }
    </style>
</head>
<body>

<div id="loginScreen" class="overlay-screen">
    <div class="auth-box">
        <div class="auth-header-row">
            <img src="logo.png" class="auth-logo" alt="Logo">
            <div class="auth-branding-text"><h2>PARAMOUNT</h2><p>Admin Access Box</p></div>
        </div>
        <input type="password" id="adminPass" class="auth-input" placeholder="Admin Password">
        <button onclick="login()" class="btn-attract">Unlock Dashboard <i class="fas fa-unlock"></i></button>
        <div class="auth-links">
            <span onclick="window.location.href='index.html'">Cancel & Return</span>
            <span onclick="openRecovery()">Forgot Password?</span>
        </div>
    </div>
</div>

<div id="recoveryScreen" class="overlay-screen" style="display:none;">
    <div class="auth-box"><h2>Reset Access</h2><input type="password" id="masterKey" class="auth-input" placeholder="Master Key"><input type="password" id="newPass" class="auth-input" placeholder="New Password"><button onclick="recoverPass()" class="btn-attract">Update Password</button><div class="auth-links"><span onclick="closeRecovery()">Back to Login</span></div></div>
</div>

<div id="mainApp" style="display:none;">
    <header>
        <div class="header-content">
            <img src="logo.png" class="header-logo" alt="Logo">
            <div class="school-branding"><span class="school-name-main">PARAMOUNT</span><span class="school-name-sub">ENGLISH MEDIUM SCHOOL</span></div>
            <div class="divider-gold"></div>
            <div class="admin-portal-text">ADMIN PORTAL</div>
        </div>
    </header>

    <div class="container">
        <div class="card" style="border-top-color: var(--gold);">
            <h3><i class="fas fa-bullhorn"></i> School Broadcast</h3>
            <textarea id="annMsg" style="width:100%; height:80px; padding:12px; border-radius:10px; border:2px solid #eee; outline:none; margin-bottom:10px; resize:none;" placeholder="Type broadcast message..."></textarea>
            <div style="display:flex; gap:10px;"><button onclick="postAnn()" class="btn-attract">Publish Now</button><button onclick="db.ref('announcement').remove()" style="background:#eee; color:#666; border:none; padding:10px 20px; border-radius:50px; font-weight:bold; cursor:pointer;">Clear</button></div>
        </div>

        <div class="card">
            <h3><i class="fas fa-calendar-check"></i> Attendance Monitoring</h3>
            <div style="display:flex; flex-direction:column; gap:10px; margin-bottom:15px;">
                <div class="filter-row">
                    <select id="clsPick" class="auth-input" style="margin:0;">
                        <option value="">-- Choose Class --</option>
                        <option value="Pre-KG">Pre-KG</option><option value="KG-1">KG-1</option><option value="KG-2">KG-2</option>
                        <option value="Grade-1">Grade-1</option><option value="Grade-2">Grade-2</option><option value="Grade-3">Grade-3</option>
                        <option value="Grade-4">Grade-4</option><option value="Grade-5">Grade-5</option><option value="Grade-6">Grade-6</option>
                        <option value="Grade-7">Grade-7</option><option value="Grade-8">Grade-8</option>
                    </select>
                    <select id="viewType" class="auth-input" style="margin:0;" onchange="toggleFilterInputs()">
                        <option value="total">Overall Totals</option>
                        <option value="monthly">Monthly Breakdown</option>
                        <option value="daily">Specific Date</option>
                    </select>
                </div>

                <div id="monthlyFilter" class="filter-row" style="display:none;">
                    <input type="month" id="monthInput" class="auth-input">
                    <button onclick="viewAtt()" class="btn-attract btn-view-report">View Monthly <i class="fas fa-search"></i></button>
                </div>

                <div id="dailyFilter" class="filter-row" style="display:none;">
                    <input type="date" id="dateInput" class="auth-input">
                    <button onclick="viewAtt()" class="btn-attract btn-view-report">View Daily <i class="fas fa-search"></i></button>
                </div>

                <button id="overallBtn" onclick="viewAtt()" class="btn-attract btn-view-report" style="width:100%; background:var(--sky);">View Overall Report <i class="fas fa-chart-line"></i></button>
            </div>
            <div class="table-container"><table id="resultsTable"><thead id="tableHead"><tr><th>Student</th><th>P</th><th>A</th><th>Total</th><th>%</th></tr></thead><tbody id="attBody"></tbody></table></div>
        </div>

        <div class="card" style="border-top-color: var(--danger);">
            <h3><i class="fas fa-tools"></i> System Maintenance</h3>
            <div style="display: grid; gap: 10px;">
                <button onclick="secureReset('monthly')" class="btn-attract warning">Reset Monthly Stats</button>
                <button onclick="secureReset('master')" class="btn-attract danger">Master Database Reset</button>
            </div>
        </div>
    </div>

    <div class="bottom-nav"><a href="index.html" class="btn-premium"><i class="fas fa-chalkboard-teacher"></i> Open Teacher Portal</a></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

    // 185 MASTER STUDENT RECORDS

        "KG-2": ["Deekshanth Sammeta", "Hanshith Erroju", "Harika Bandi", "Himarsha Naini", "Karthik Vallepu", "Kruthika Bandi", "Rajavardhan Gampala", "Roshan Kaitha", "Sri Anshu Ayaan Lyadala", "Srihansh Bandi", "Srikshitha Guduri", "Varshith Gonela", "Adyasri Makala", "Anvik Boini", "Anvith Pokanati", "Awais Ur Rehman Mohammad", "Dakshu Pothuganti", "Hansith Reddy Katukuri", "Harshith Pokanati", "Jella Aditya", "Krishank Nallabothula", "Kundana Katkuri", "Munukuntla Revanth Rudhra", "Niraja Nethri Siluveru", "Pranav Mattepelli", "Sreenith Yadav Naini", "Uvan Reddy Dasari", "Zayan Mohammad", "Zoya Mohammed"],
        "Grade-1": ["Dheeraj Gattu", "Preetham Sannayala", "Shiva nandu Gonela", "Shrayan Nuthanakanti", "Sriyanksha Mandala", "Advitha Garige", "Harika Bandi", "Himansi Kondoju", "Izhaan Rahamath Syed", "Jaisurya Myakala", "Khadeeja Fathima", "Manaswini Dandugula", "Manusri Bandi", "Rithwik krishna Amaravadi", "Rohan Bandi", "Shiva Junnu", "Shivanandh Bandi", "Sridha Thalla", "Srinika Chengelly", "Sriyanshi Oggula", "Vishwak Chekka"],

        "Grade-4": ["Abdul Saqib Mohammad", "Anudeep Chintha", "Bhavan Bandi", "Harshavardhan Gonela", "Jayadev Chiluveru", "Mahaboob Syed", "Nandith Reddy Enugala", "Sai Charan Goud Mandala", "Sai Prasanna Keerthi", "Ajmeri Shaik", "Akshith Chiluveru", "Jayasri Myakala", "Rahul Kanjarla", "Saketh Devarakonda"],
        "Grade-5": ["Adya Reddy Vangala", "Kowshik Patel Muppa", "Siri Singaram", "Srikar Mandala", "Abdus Salaam MD", "Akshith Ram Kalvacharla", "Jaffar Anas Shaik", "Khaja Azeemuddin Mohammed", "Nihan Mohammed", "Saif Shaik", "Saketh Renukuntla", "Sreeja Dasari", "Vidhaatri Sahani"],
        "Grade-6": ["Abdul Razzak Mohammad", "Anudeepthi Chintha", "Saketh Ranaveni", "Shiva Sri Katukuri", "Aklees Shaik", "Akshya Kalvacharla", "Prince Katkuri"],
        "Grade-7": ["Manikanta Sannayala", "Sreeyan Reddy Karra", "Jayadhithya Chiluveru"],
        "Grade-8": ["Sathwika Nagavelly", "Vyshnavi Uppala", "Akshaya Gampala", "Ganesh Oggula", "Gayathri Renukuntla", "Khaja Sadeemuddin Mohammed"]
    };

    async function login() { const snap = await db.ref('admin/password').once('value'); const correct = snap.val() || "Ahmad@07"; if(document.getElementById('adminPass').value === correct) { document.getElementById('loginScreen').style.display='none'; document.getElementById('mainApp').style.display='block'; } else { Swal.fire('Error', 'Incorrect Password', 'error'); } }
    function openRecovery() { document.getElementById('loginScreen').style.display='none'; document.getElementById('recoveryScreen').style.display='flex'; }
    function closeRecovery() { document.getElementById('recoveryScreen').style.display='none'; document.getElementById('loginScreen').style.display='flex'; }
    function toggleFilterInputs() { const type = document.getElementById('viewType').value; document.getElementById('monthlyFilter').style.display = (type === 'monthly') ? 'flex' : 'none'; document.getElementById('dailyFilter').style.display = (type === 'daily') ? 'flex' : 'none'; document.getElementById('overallBtn').style.display = (type === 'total') ? 'block' : 'none'; }
    function postAnn() { db.ref('announcement').set(document.getElementById('annMsg').value).then(() => Swal.fire('Published', '', 'success')); }

    async function viewAtt() {
        const cls = document.getElementById('clsPick').value;
        const type = document.getElementById('viewType').value;
        const body = document.getElementById('attBody');
        const head = document.getElementById('tableHead');
        if(!cls) return Swal.fire('Error', 'Pick a class', 'info');
        body.innerHTML = '<tr><td colspan="5">Loading...</td></tr>';

        if(type === 'daily') {
            const date = document.getElementById('dateInput').value;
            if(!date) return Swal.fire('Error', 'Pick date', 'warning');
            head.innerHTML = `<tr><th>Student</th><th colspan="4">Status</th></tr>`;
            db.ref(`daily_attendance/${date}/${cls}`).once('value', (snap) => {
                const data = snap.val() || {};
                const students = studentDataMaster[cls] || [];
                body.innerHTML = students.map(n => `<tr><td>${n}</td><td colspan="4" style="font-weight:800; color:${data[n] ? 'green':'red'}">${data[n] === true ? 'PRESENT' : (data[n] === false ? 'ABSENT' : 'Not Marked')}</td></tr>`).join('');
            });
        } else {
            head.innerHTML = `<tr><th>Student</th><th>P</th><th>A</th><th>Total</th><th>%</th></tr>`;
            db.ref(`attendance/${cls}/students`).once('value', (snap) => {
                const data = snap.val() || {};
                const students = studentDataMaster[cls] || [];
                body.innerHTML = students.map(n => {
                    let p=0, t=0;
                    if(type === 'monthly') {
                        const m = document.getElementById('monthInput').value;
                        const mD = (data[n] && data[n].months && data[n].months[m]) ? data[n].months[m] : {present:0, total:0};
                        p = mD.present; t = mD.total;
                    } else if (data[n] && data[n].months) { Object.values(data[n].months).forEach(v => { p += v.present; t += v.total; }); }
                    return `<tr><td>${n}</td><td>${p}</td><td>${t-p}</td><td>${t}</td><td>${t>0?Math.round(p/t*100):0}%</td></tr>`;
                }).join('');
            });
        }
    }

    async function secureReset(mode) {
        const { value: pass } = await Swal.fire({ title: 'Authentication', text: 'Enter Admin Pass to confirm.', input: 'password', showCancelButton: true });
        if(pass === "Ahmad@07") {
            if(mode === 'master') { db.ref('attendance').remove(); db.ref('daily_attendance').remove(); Swal.fire('Wiped!', '', 'success'); }
            else {
                const m = document.getElementById('monthInput').value;
                if(!m) return Swal.fire('Error', 'Select month first', 'error');
                const snap = await db.ref('attendance').once('value');
                const updates = {};
                if(snap.val()) Object.keys(snap.val()).forEach(c => { const st = snap.val()[c].students; if(st) Object.keys(st).forEach(n => updates[`attendance/${c}/students/${n}/months/${m}`] = null); });
                await db.ref().update(updates); Swal.fire('Cleared!', m, 'success');
            }
        } else if(pass) { Swal.fire('Error', 'Wrong Pass', 'error'); }
    }
    document.getElementById('monthInput').value = new Date().toISOString().slice(0, 7);
</script>
</body>
</html>
