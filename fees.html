<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fee Portal | Paramount School</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --forest: #006633; --gold: #ffd700; --danger: #c62828; --light: #f4f7f6; --sky: #2196f3; }
        * { box-sizing: border-box; } 
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding-bottom: 50px; overflow-x: hidden; }

        /* --- LOGIN SCREEN (ADMIN STYLE) --- */
        .overlay-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--light); z-index: 1000; display: flex; justify-content: center; align-items: center; padding: 15px; }
        .auth-box { background: white; padding: 40px 25px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 420px; border-bottom: 5px solid var(--forest); text-align: center; }
        .auth-header-row { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; margin-bottom: 25px; }
        .auth-logo { height: 75px; width: auto; }
        .auth-branding-text h2 { margin: 5px 0 0; font-family: 'Montserrat', sans-serif; font-size: 1.6rem; font-weight: 800; color: var(--forest); }
        .auth-branding-text p { margin: 0; font-size: 0.75rem; font-weight: 700; color: var(--gold); text-transform: uppercase; }
        .auth-input { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #eee; margin-bottom: 15px; text-align: center; font-size: 16px; outline: none; }
        .btn-unlock { background: linear-gradient(135deg, var(--forest), #004d26); color: white; padding: 15px; border-radius: 50px; font-weight: bold; border: 2px solid var(--gold); cursor: pointer; font-size: 14px; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        /* --- MAIN APP LAYOUT --- */
        header { background: var(--forest); color: white; padding: 20px 3%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header-content { display: flex; align-items: center; justify-content: center; max-width: 1400px; margin: 0 auto; gap: 15px; }
        .header-logo { height: 60px; }
        .school-name-main { font-family: 'Montserrat', sans-serif; font-size: 1.8rem; font-weight: 800; }
        
        .container { max-width: 600px; margin: 20px auto; padding: 0 15px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); border-top: 8px solid var(--forest); }
        
        label { display: block; font-size: 10px; font-weight: 900; color: #777; margin: 15px 0 5px; text-transform: uppercase; letter-spacing: 1px; }
        select, input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #eee; font-size: 15px; outline: none; background: #fafafa; }
        
        .calc-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .due-box { background: #fff5f5; border: 1px solid #ffcdd2; padding: 15px; border-radius: 15px; text-align: center; margin-top: 20px; }
        .due-box strong { font-size: 24px; color: var(--danger); }

        .chart-container { margin-top: 25px; padding: 15px; background: #f9f9f9; border-radius: 15px; border: 1px solid #eee; }
        .bar-bg { width: 100%; height: 30px; background: #eee; border-radius: 50px; overflow: hidden; display: flex; }
        .bar-paid { height: 100%; background: linear-gradient(to right, var(--forest), #00b359); transition: width 0.8s ease; width: 0%; }
        
        .btn-action { width: 100%; color: white; border: 2px solid var(--gold); padding: 16px; border-radius: 50px; font-weight: 700; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-save { background: var(--forest); }
        .btn-print { background: var(--sky); border-color: white; }
        .btn-danger { background: var(--danger); border-color: white; }
    </style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<div id="feeLoginScreen" class="overlay-screen">
    <div class="auth-box">
        <div class="auth-header-row">
            <img src="logo.png" class="auth-logo">
            <div class="auth-branding-text"><h2>PARAMOUNT SCHOOL</h2><p>Fee Access Box</p></div>
        </div>
        <select id="staffName" class="auth-input">
            <option value="">-- Select Staff --</option>
            <option value="Mr. Ahmad">Mr. Ahmad</option>
            <option value="Ms. Roqiya">Ms. Roqiya</option>
            <option value="Ms. Jyothi">Ms. Jyothi</option>
        </select>
        <input type="password" id="staffPass" class="auth-input" placeholder="Enter Password" onkeypress="if(event.key === 'Enter') unlockFees()">
        <button onclick="unlockFees()" class="btn-unlock">Unlock Fee Portal <i class="fas fa-unlock"></i></button>
        <div class="auth-links" style="margin-top:15px;"><span onclick="window.location.href='index.html'" style="cursor:pointer; color:#666; font-size:13px; text-decoration:underline;">Cancel & Return</span></div>
    </div>
</div>

<div id="feeApp" style="display:none;">
    <header>
        <div class="header-content">
            <img src="logo.png" class="header-logo">
            <div class="school-branding" style="margin-left:10px;"><span class="school-name-main" style="color:white;">PARAMOUNT</span></div>
        </div>
    </header>

    <div class="container">
        <div class="card">
            <div id="staffDisplay" style="text-align:center; font-weight:bold; color:var(--forest); background:#e8f5e9; padding:8px; border-radius:10px; margin-bottom:15px;"></div>
            <h3><i class="fas fa-file-invoice-dollar"></i> Fee Entry</h3>
            
            <label>Class</label>
            <select id="feeClass" onchange="populateStudents()">
                <option value="">-- Choose Class --</option>
                <option value="Pre-KG">Pre-KG</option><option value="KG-1">KG-1</option><option value="KG-2">KG-2</option>
                <option value="Grade-1">Grade-1</option><option value="Grade-2">Grade-2</option><option value="Grade-3">Grade-3</option>
                <option value="Grade-4">Grade-4</option><option value="Grade-5">Grade-5</option><option value="Grade-6">Grade-6</option>
                <option value="Grade-7">Grade-7</option><option value="Grade-8">Grade-8</option>
            </select>

            <label>Student Name</label>
            <select id="feeStudent" onchange="fetchExistingFeeData()"><option value="">-- Select Student --</option></select>

            <div class="calc-row">
                <div><label>Total Fee (₹)</label><input type="number" id="totalFee" oninput="calculateRealTime()"></div>
                <div><label>Paid Now (₹)</label><input type="number" id="payingAmount" oninput="calculateRealTime()"></div>
            </div>

            <div class="due-box"><span>BALANCE DUE</span><br><strong id="dueDisplay">₹ 0</strong></div>

            <div class="chart-container">
                <div class="bar-bg"><div id="barPaid" class="bar-paid"></div></div>
                <p id="percentText" style="text-align:center; font-weight:bold; margin-top:10px; font-size:12px;">0% Paid</p>
            </div>

            <label>Date</label><input type="date" id="payDate">

            <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 25px;">
                <button class="btn-action btn-save" onclick="saveFee()">Update Records <i class="fas fa-save"></i></button>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-action btn-print" onclick="generateReceipt()">Receipt <i class="fas fa-print"></i></button>
                    <button class="btn-action btn-danger" onclick="clearStudentData()">Clear <i class="fas fa-trash-alt"></i></button>
                </div>
            </div>
            
            <a href="index.html" style="display:block; text-align:center; margin-top:20px; text-decoration:none; color:#666; font-weight:bold; font-size:13px;">Return to Portal</a>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDRYk9KOK-ga0c88dnYMsAoifW2NJTd_Y8", databaseURL: "https://paramount-school-d55bc-default-rtdb.firebaseio.com", projectId: "paramount-school-d55bc" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const authorized = { "Mr. Ahmad": "Ahmad@123", "Ms. Roqiya": "Roqiya@123", "Ms. Jyothi": "Jyothi@123" };
    let activeTeacher = "";

    function unlockFees() {
        const name = document.getElementById('staffName').value;
        const pass = document.getElementById('staffPass').value;
        if(pass === authorized[name]) {
            activeTeacher = name;
            document.getElementById('feeLoginScreen').style.display = 'none';
            document.getElementById('feeApp').style.display = 'block';
            document.getElementById('staffDisplay').innerText = "Active: " + name;
        } else {
            Swal.fire('Error', 'Invalid Credentials', 'error');
        }
    }

    const studentData = {
        "Pre-KG": ["Hanish Macharla", "Arjun Vihaar Illandula", "Thanu sree Allakunta", "Aadhya Gangaraboina", "Aadhya Sri Oggula", "Aadhyasri Shivagoni", "Afraha Begum", "Aliya Sultana", "Anvika Bandi", "Aradana Devara konda", "Devansh Bandi", "Hanvitha Mulkalapelli", "Harsha Vardhan Seenapelli", "Hiranya Bandi", "Jashritha Boina", "Konreddy Shreyanvi", "Kriyansh Sammeta", "Mohammed Mohiuddin Sayyad", "Nethra Narkurthi", "Reeyansh Bandi", "Rishi Manupati", "Rudransh Bandi", "Sanvika Bandi", "Shanvith Khatha", "Shishira Jalagam", "Shiva Sai Mekala", "Shree Rudhraveer Chevvu", "Shreyansh Gangaraboina", "Sreeja Thalla", "Srikrithini Myakala", "Srivatsav Vanam", "Sriyansh Mekala", "Thanvika Lakka", "Thrilokansh Vudari", "Ujjwal Chekka", "Vaishnavi Lakka", "Vedansh Myakala", "Vishnu Priya Molugu", "Vyshnav Tej Boina", "Yafiah Mohammad"],
        "KG-1": ["Aadhya Sri Amaravadi", "Aditya Manda", "Aadhya Jella", "Advaita Gauri Bandi", "Aizah Amna Shaik", "Akshara Singaram", "Bhahuveer Raj Somishetti", "Gayathri Erroju", "Hanvika Mulkalapelli", "Manvith Kondoju", "Sayyad Vajeed", "Mekala Manu sri", "Oliva Grace Vallapu", "Rithwik Oggula", "Rithwika Kandagatla", "Srimahi Chevvu", "Thanvesh Thalla", "Trishul Nanduri", "Yoganshika Nanduri", "Yusra Mohammad", "Zainul Abideen Syed"],
        "KG-2": ["Deekshanth Sammeta", "Hanshith Erroju", "Harika Bandi", "Himarsha Naini", "Karthik Vallepu", "Kruthika Bandi", "Rajavardhan Gampala", "Roshan Kaitha", "Sri Anshu Ayaan Lyadala", "Srihansh Bandi", "Srikshitha Guduri", "Varshith Gonela", "Adyasri Makala", "Anvik Boini", "Anvith Pokanati", "Awais Ur Rehman Mohammad", "Dakshu Pothuganti", "Hansith Reddy Katukuri", "Harshith Pokanati", "Jella Aditya", "Krishank Nallabothula", "Kundana Katkuri", "Munukuntla Revanth Rudhra", "Niraja Nethri Siluveru", "Pranav Mattepelli", "Sreenith Yadav Naini", "Uvan Reddy Dasari", "Zayan Mohammad", "Zoya Mohammed"],
        "Grade-1": ["Dheeraj Gattu", "Preetham Sannayala", "Shiva nandu Gonela", "Shrayan Nuthanakanti", "Sriyanksha Mandala", "Advitha Garige", "Harika Bandi", "Himansi Kondoju", "Izhaan Rahamath Syed", "Jaisurya Myakala", "Khadeeja Fathima", "Manaswini Dandugula", "Manusri Bandi", "Rithwik krishna Amaravadi", "Rohan Bandi", "Shiva Junnu", "Shivanandh Bandi", "Sridha Thalla", "Srinika Chengelly", "Sriyanshi Oggula", "Vishwak Chekka"],
        "Grade-2": ["Aliza Manha Shaik", "Dhruvan Reddy Katukuri", "Druthika Enugala", "Manaswini Bandi", "Rakshith Macharla", "Sathwika Katkuri", "Shalini Uppala", "Chandu Devarakonda", "Gnaneshwar Pokanati", "Hasnain Syed", "Koushik Siluveru", "Senen Desabattula", "Shivarajan Pothuganti"],
        "Grade-3": ["Nagavelly Manikanta", "Mirja Ismail", "Bandi Aryan", "Dandugula Mahesh Babu", "Bandi Tejasri", "Bandi Harshavardhan", "Gampala Vyshnavi", "Gampala Laxmi", "Garige Harshith", "Katkuri Hanish", "Katukuri Manideep", "MD Abdul Quddus", "Muppa Sathwik Patel", "Nuthanakanti Sansita", "Pasarakonda Ritwin", "Pinninti Rakshith Rao", "Rayi Sriman Adithya"],
        "Grade-4": ["Abdul Saqib Mohammad", "Anudeep Chintha", "Bhavan Bandi", "Harshavardhan Gonela", "Jayadev Chiluveru", "Mahaboob Syed", "Nandith Reddy Enugala", "Sai Charan Goud Mandala", "Sai Prasanna Keerthi", "Ajmeri Shaik", "Akshith Chiluveru", "Jayasri Myakala", "Rahul Kanjarla", "Saketh Devarakonda"],
        "Grade-5": ["Adya Reddy Vangala", "Kowshik Patel Muppa", "Siri Singaram", "Srikar Mandala", "Abdus Salaam MD", "Akshith Ram Kalvacharla", "Jaffar Anas Shaik", "Khaja Azeemuddin Mohammed", "Nihan Mohammed", "Saif Shaik", "Saketh Renukuntla", "Sreeja Dasari", "Vidhaatri Sahani"],
        "Grade-6": ["Abdul Razzak Mohammad", "Anudeepthi Chintha", "Saketh Ranaveni", "Shiva Sri Katukuri", "Aklees Shaik", "Akshya Kalvacharla", "Prince Katkuri"],
        "Grade-7": ["Manikanta Sannayala", "Sreeyan Reddy Karra", "Jayadhithya Chiluveru"],
        "Grade-8": ["Sathwika Nagavelly", "Vyshnavi Uppala", "Akshaya Gampala", "Ganesh Oggula", "Gayathri Renukuntla", "Khaja Sadeemuddin Mohammed"]
    };

    function populateStudents() {
        const cls = document.getElementById('feeClass').value;
        const select = document.getElementById('feeStudent');
        select.innerHTML = '<option value="">-- Select Student --</option>';
        if(studentData[cls]) studentData[cls].forEach(s => select.innerHTML += `<option value="${s}">${s}</option>`);
    }

    async function fetchExistingFeeData() {
        const cls = document.getElementById('feeClass').value;
        const name = document.getElementById('feeStudent').value;
        if(!cls || !name) return;
        const snap = await db.ref(`fee_records/${cls}/${name}`).limitToLast(1).once('value');
        const data = snap.val();
        if(data) {
            const last = Object.values(data)[0];
            document.getElementById('totalFee').value = last.total || "";
            calculateRealTime();
        }
    }

    function calculateRealTime() {
        const total = parseFloat(document.getElementById('totalFee').value) || 0;
        const paid = parseFloat(document.getElementById('payingAmount').value) || 0;
        const due = total - paid;
        document.getElementById('dueDisplay').innerText = "₹ " + (due < 0 ? 0 : due);
        let pct = (total > 0) ? (paid / total) * 100 : 0;
        document.getElementById('barPaid').style.width = Math.min(pct, 100) + "%";
        document.getElementById('percentText').innerText = Math.round(pct) + "% Paid";
    }

    function saveFee() {
        const cls = document.getElementById('feeClass').value;
        const name = document.getElementById('feeStudent').value;
        const total = document.getElementById('totalFee').value;
        const paid = document.getElementById('payingAmount').value;
        const date = document.getElementById('payDate').value;
        if(!cls || !name || !paid) return Swal.fire('Error', 'Missing Data', 'warning');
        const record = { total, paid, due: total - paid, recordedBy: activeTeacher, date, timestamp: new Date().toLocaleString() };
        db.ref(`fee_records/${cls}/${name}`).push(record).then(() => {
            Swal.fire('Saved!', 'Record updated.', 'success');
            document.getElementById('payingAmount').value = '';
            calculateRealTime();
        });
    }

    function generateReceipt() {
        const cls = document.getElementById('feeClass').value;
        const name = document.getElementById('feeStudent').value;
        const total = document.getElementById('totalFee').value;
        const paid = document.getElementById('payingAmount').value;
        const due = document.getElementById('dueDisplay').innerText;
        const date = document.getElementById('payDate').value;
        if (!name || !paid) return Swal.fire('Error', 'No data to print', 'warning');

        const win = window.open('', '', 'height=600,width=400');
        win.document.write(`<html><head><title>Receipt</title></head><body style="padding:20px; font-family:sans-serif;">
            <center><img src="logo.png" style="height:60px;"><br>
            <h2 style="color:#006633; margin:10px 0;">PARAMOUNT SCHOOL</h2>
            <hr><p><strong>FEE RECEIPT</strong></p></center>
            <p><strong>Student:</strong> ${name} (${cls})</p>
            <p><strong>Date:</strong> ${date}</p>
            <p><strong>Total:</strong> ₹ ${total}</p>
            <p><strong>Paid:</strong> ₹ ${paid}</p>
            <p><strong>Balance:</strong> ${due}</p>
            <hr><p style="font-size:12px; text-align:center;">Issued by: ${activeTeacher}</p>
        </body></html>`);
        win.document.close();
        win.print();
    }

    async function clearStudentData() {
        const cls = document.getElementById('feeClass').value;
        const name = document.getElementById('feeStudent').value;
        if (!name) return Swal.fire('Error', 'Select a student', 'warning');

        const { value: pass } = await Swal.fire({
            title: 'Verify Password',
            text: `Enter password for ${activeTeacher} to delete records`,
            input: 'password',
            showCancelButton: true
        });

        if (pass === authorized[activeTeacher]) {
            db.ref(`fee_records/${cls}/${name}`).remove().then(() => {
                Swal.fire('Deleted!', 'Data cleared.', 'success');
                document.getElementById('totalFee').value = '';
                document.getElementById('payingAmount').value = '';
                calculateRealTime();
            });
        } else if (pass) {
            Swal.fire('Error', 'Incorrect Password', 'error');
        }
    }

    document.getElementById('payDate').valueAsDate = new Date();
</script>
</body>
</html>
