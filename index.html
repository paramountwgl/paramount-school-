<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paramount School | Teacher Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --forest: #006633; --gold: #ffd700; --danger: #e53935; --light: #f4f7f6; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding-bottom: 50px; overflow-x: hidden; }
        
        header { background: var(--forest); color: white; padding: 25px 3%; box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
        .header-content { display: flex; align-items: center; justify-content: center; gap: 15px; max-width: 1400px; margin: 0 auto; width: 100%; }
        .header-logo { height: clamp(60px, 8vw, 85px); width: auto; flex-shrink: 0; }
        .school-text { display: flex; flex-direction: column; line-height: 1.1; text-align: left; }
        .school-name-main { font-family: 'Montserrat', sans-serif; font-size: clamp(1.4rem, 4vw, 2.2rem); font-weight: 800; letter-spacing: 1px; }
        .school-name-sub { font-family: 'Montserrat', sans-serif; font-size: clamp(0.7rem, 2vw, 1rem); color: var(--gold); font-weight: 700; text-transform: uppercase; }

        .container { max-width: 850px; margin: 0 auto; padding: 0 15px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 25px; border-top: 8px solid var(--forest); }
        h3 { color: var(--forest); margin: 0 0 25px; font-size: 1.5rem; text-align: center; border-bottom: 2px solid #f0f0f0; padding-bottom: 15px; text-transform: uppercase; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 10px; }
        label { display: block; font-size: 11px; font-weight: 900; color: #777; margin: 15px 0 8px; text-transform: uppercase; letter-spacing: 1px; }
        select, input, textarea { width: 100%; padding: 14px; border-radius: 10px; border: 2px solid #ddd; font-size: 15px; outline: none; }
        .row-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .btn { flex: 1; background: linear-gradient(135deg, var(--forest), #004d26); color: white; border: 2px solid var(--gold); padding: 15px; border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 14px; margin-top: 15px; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn.warning { background: linear-gradient(135deg, #fb8c00, #ef6c00); border-color: white; }
        .student-item { display: flex; align-items: center; justify-content: space-between; padding: 14px; border-bottom: 1px solid #eee; }
        input[type="checkbox"] { width: 22px; height: 22px; accent-color: var(--forest); cursor: pointer; }
        
        .hw-info-bar { font-size: 12px; color: #555; margin-top: 8px; font-style: italic; padding: 8px; background: #f0f4f2; border-radius: 8px; border-left: 4px solid var(--gold); display: none; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

<header>
    <div class="header-content">
        <img src="logo.png" class="header-logo" alt="Logo">
        <div class="school-text">
            <span class="school-name-main">PARAMOUNT</span>
            <span class="school-name-sub">ENGLISH MEDIUM SCHOOL</span>
        </div>
    </div>
</header>

<div class="container" style="margin-top: 30px;">
    <div class="card">
        <h3><i class="fas fa-id-badge"></i> Staff Selection</h3>
        <label>Select Your Name</label>
        <select id="teacherSelect" onchange="verifyAccess()">
            <option value="">-- Choose Name --</option>
            <option value="Mr. Shaik Ahmad">Mr. Shaik Ahmad</option>
            <option value="Ms. Riha">Ms. Riha (IIT)</option>
            <option value="Ms. Raniya Zainab">Ms. Raniya Zainab (Physics)</option>
            <option value="Ms. Roqiya Begum">Ms. Roqiya Begum</option>
            <option value="Ms. G.Rajitha">Ms. G.Rajitha</option>
            <option value="Ms. Ameena Tabassum">Ms. Ameena Tabassum</option>
            <option value="Ms. Shaik Shabana">Ms. Shaik Shabana</option>
            <option value="Ms. B.Ravali">Ms. B.Ravali</option>
            <option value="Ms. L.Kalyani">Ms. L.Kalyani</option>
            <option value="Ms. J.Alaya Sree">Ms. J.Alaya Sree</option>
            <option value="Ms. S.Sujatha">Ms. S.Sujatha</option>
            <option value="Ms. J.Prathibha">Ms. J.Prathibha</option>
            <option value="Ms. P.Shailaja">Ms. P.Shailaja</option>
            <option value="Ms. A.Jhansi Rani">Ms. A.Jhansi Rani</option>
            <option value="Ms. S. Neelima">Ms. S. Neelima</option>
        </select>
    </div>

    <div class="card" id="attCard" style="display:none;">
        <h3>Mark Attendance</h3>
        <div class="row-grid">
            <div><label>Class</label><select id="attClass" onchange="loadStudents()">
                <option value="">-- Select --</option>
                <option value="Pre-KG">Pre-KG</option><option value="KG-1">KG-1</option>
                <option value="KG-2">KG-2</option><option value="Grade-1">Grade-1</option>
                <option value="Grade-2">Grade-2</option><option value="Grade-3">Grade-3</option>
                <option value="Grade-4">Grade-4</option><option value="Grade-5">Grade-5</option>
                <option value="Grade-6">Grade-6</option><option value="Grade-7">Grade-7</option>
                <option value="Grade-8">Grade-8</option>
            </select></div>
            <div><label>Date</label><input type="date" id="attDate" onchange="loadStudents()"></div>
        </div>
        <div id="studentList" style="margin-top:15px;"></div>
        <button id="submitAtt" class="btn" style="display:none;" onclick="saveAttendance()">Update Attendance <i class="fas fa-check-double"></i></button>
    </div>

    <div class="card" id="hwCard" style="border-top-color: var(--gold); display:none;">
        <h3>Daily Homework Tool</h3>
        <div class="row-grid">
            <div>
                <label>Class</label>
                <select id="hwClass" onchange="updateHWSubjects()">
                    <option value="Pre-KG">Pre-KG</option><option value="KG-1">KG-1</option>
                    <option value="KG-2">KG-2</option><option value="Grade-1">Grade-1</option>
                    <option value="Grade-2">Grade-2</option><option value="Grade-3">Grade-3</option>
                    <option value="Grade-4">Grade-4</option><option value="Grade-5">Grade-5</option>
                    <option value="Grade-6">Grade-6</option><option value="Grade-7">Grade-7</option>
                    <option value="Grade-8">Grade-8</option>
                </select>
            </div>
            <div><label>Date</label><input type="date" id="hwDate" onchange="fetchExistingHW()"></div>
        </div>
        <label>Subject</label><select id="hwSubSelect" onchange="fetchExistingHW()"></select>
        <label>Task Details</label><textarea id="hwTask" rows="3" placeholder="Type instructions..."></textarea>
        
        <div id="hwAuditTrail" class="hw-info-bar">
            <i class="fas fa-history"></i> <span id="auditText"></span>
        </div>

        <div style="display:flex; gap:12px; margin-top:15px;">
            <button class="btn" onclick="postHomework()"><i class="fas fa-upload"></i> Publish / Update</button>
            <button class="btn warning" style="flex:0.5;" onclick="clearHomework()"><i class="fas fa-eraser"></i> Clear</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDRYk9KOK-ga0c88dnYMsAoifW2NJTd_Y8", databaseURL: "https://paramount-school-d55bc-default-rtdb.firebaseio.com", projectId: "paramount-school-d55bc" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let authenticatedTeacher = "";

    const registry = {
        "Mr. Shaik Ahmad": "Ahmad@123", "Ms. Roqiya Begum": "Roqiya@123", "Ms. G.Rajitha": "Rajitha@123",
        "Ms. Ameena Tabassum": "Ameena@123", "Ms. Shaik Shabana": "Shabana@123", "Ms. B.Ravali": "Ravali@123",
        "Ms. L.Kalyani": "Kalyani@123", "Ms. J.Alaya Sree": "Alaya@123", "Ms. S.Sujatha": "Sujatha@123",
        "Ms. J.Prathibha": "Prathibha@123", "Ms. P.Shailaja": "Shailaja@123", "Ms. A.Jhansi Rani": "Jhansi@123", 
        "Ms. S. Neelima": "Neelima@123", "Ms. Riha": "Riha@123", "Ms. Raniya Zainab": "Raniya@123"
    };

    async function verifyAccess() {
        const name = document.getElementById('teacherSelect').value;
        if(!name) return;
        const { value: pw } = await Swal.fire({ 
            title: `Staff Login`, text: `Enter password for ${name}`, 
            input: 'password', showCancelButton: true
        });

        if(pw === registry[name]) { 
            authenticatedTeacher = name;
            
            // LOGIC: Check if part-time
            const isPartTime = (name === "Ms. Riha" || name === "Ms. Raniya Zainab");
            
            if(isPartTime) {
                document.getElementById('attCard').style.display = 'none';
                document.getElementById('hwCard').style.display = 'block';
                Swal.fire('Welcome', `Hello ${name}. Access granted to Homework Tool.`, 'success');
            } else {
                document.getElementById('attCard').style.display = 'block';
                document.getElementById('hwCard').style.display = 'block';
                Swal.fire('Welcome', `Hello ${name}. Full portal access granted.`, 'success');
            }
        } else if(pw) { 
            Swal.fire('Error', 'Incorrect Password', 'error'); 
            document.getElementById('teacherSelect').value = ""; 
        }
    }

    // [Attendance Logic: loadStudents & saveAttendance stay exactly as they were]
    // [Homework Logic: updateHWSubjects & fetchExistingHW stay exactly as they were]

    function postHomework() { 
        const d = document.getElementById('hwDate').value; 
        const c = document.getElementById('hwClass').value; 
        const s = document.getElementById('hwSubSelect').value; 
        const t = document.getElementById('hwTask').value; 
        if(!d || !t) return;
        const now = new Date();
        const timeStamp = now.toLocaleDateString() + " " + now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        db.ref(`homework/${d}/${c}/${s}`).set({
            task: t, updatedBy: authenticatedTeacher, updatedAt: timeStamp
        }).then(() => {
            Swal.fire('Updated!', 'Homework is live.', 'success');
            fetchExistingHW();
        }); 
    }

    // Initialization
    document.getElementById('hwDate').valueAsDate = new Date();
    document.getElementById('attDate').valueAsDate = new Date();
    updateHWSubjects();
</script>
</body>
</html>
