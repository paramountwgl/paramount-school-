<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paramount School | Teachers Portal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --forest: #006633; --gold: #ffd700; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 0; }
        
        header { 
            background: var(--forest); 
            color: white; 
            padding: 20px 5%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 20px;
            flex-wrap: wrap;
        }
        .logo-img { height: 75px; width: auto; }
        .school-name { font-size: clamp(1.1rem, 4vw, 2rem); font-weight: 900; margin: 0; }
        .school-tagline { font-size: clamp(0.7rem, 2.5vw, 1rem); opacity: 0.9; }

        .container { max-width: 500px; margin: 15px auto; padding: 10px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { color: var(--forest); text-align: center; border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        
        label { display: block; font-size: 13px; font-weight: bold; color: #666; margin-top: 15px; }
        select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; margin-top: 5px; }
        
        .student-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 5px; border-bottom: 1px solid #f0f0f0; }
        .present-toggle { width: 26px; height: 26px; accent-color: var(--forest); cursor: pointer; }

        .submit-btn { 
            background: #1D6F42; color: white; border: none; padding: 18px; 
            border-radius: 35px; width: 100%; font-weight: bold; font-size: 16px; 
            cursor: pointer; margin-top: 25px; display: none; align-items: center; 
            justify-content: center; gap: 10px; box-shadow: 0 4px 12px rgba(29, 111, 66, 0.2);
        }
        .submit-btn:active { transform: scale(0.98); }

        @media (max-width: 600px) {
            header { flex-direction: column; text-align: center; }
            .logo-img { height: 60px; }
        }
    </style>
</head>
<body>

<header>
    <img src="logo.png" alt="Logo" class="logo-img" id="webLogo" onerror="this.style.display='none'">
    <div style="text-align: left;" class="school-info">
        <h1 class="school-name">PARAMOUNT ENGLISH MEDIUM SCHOOL</h1>
        <p class="school-tagline">Teachers Official Attendance Portal</p>
    </div>
</header>

<div class="container">
    <div class="card">
        <h2>Mark Attendance</h2>
        
        <label>Teacher Name</label>
        <select id="teacherName">
            <option value="">-- Select Teacher --</option>
            <option value="Mr. Shaik Ahmad">Mr. Shaik Ahmad</option>
            <option value="Ms. Geethika">Ms. Geethika</option>
        </select>

        <label>Class</label>
        <select id="classSelect" onchange="generateList()">
            <option value="">-- Choose Class --</option>
            <option value="10th-A">10th Grade - A</option>
            <option value="9th-B">9th Grade - B</option>
        </select>

        <div id="listContainer"></div>

        <button id="submitBtn" class="submit-btn" onclick="submitAttendance()">
            <i class="fas fa-check-circle"></i> Submit Attendance & Download
        </button>
    </div>
</div>

<script>
const schoolData = {
    "10th-A": ["Shaik Tauseef Ali", "Rahul Sharma", "Zoya Khan", "Abhishek Das"],
    "9th-B": ["Shaik Minhaj Ali", "Sana Khan", "Aryan Raj"]
};

function generateList() {
    const cls = document.getElementById('classSelect').value;
    const listDiv = document.getElementById('listContainer');
    const submitBtn = document.getElementById('submitBtn');
    listDiv.innerHTML = "";
    
    if (schoolData[cls]) {
        schoolData[cls].forEach(name => {
            listDiv.innerHTML += `
                <div class="student-row">
                    <span class="name-text" style="font-weight: 600;">${name}</span>
                    <input type="checkbox" class="present-toggle" checked>
                </div>`;
        });
        submitBtn.style.display = "flex";
    } else { submitBtn.style.display = "none"; }
}

function submitAttendance() {
    const teacher = document.getElementById('teacherName').value;
    const cls = document.getElementById('classSelect').value;
    const dateStr = new Date().toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });

    if(!teacher || !cls) return alert("Select Teacher and Class First!");

    // Constructing Table for Excel
    let tableHtml = `<table border="1" style="border-collapse: collapse;">
        <thead>
            <tr><th colspan="4" style="background-color: #006633; color: #ffffff; font-size: 16pt; height: 40pt;">PARAMOUNT ENGLISH MEDIUM SCHOOL</th></tr>
            <tr><th colspan="4" style="background-color: #ffd700; color: #000000; font-size: 12pt; height: 25pt;">OFFICIAL ATTENDANCE REPORT</th></tr>
            <tr><th colspan="2" style="text-align:left;">Date: ${dateStr}</th><th colspan="2" style="text-align:left;">Teacher: ${teacher}</th></tr>
            <tr><th colspan="2" style="text-align:left;">Class: ${cls}</th><th colspan="2" style="text-align:left;">Status: FINALIZED</th></tr>
            <tr style="background-color: #eeeeee; font-weight: bold;">
                <th>S.No</th><th>STUDENT NAME</th><th>STATUS</th><th>REMARKS</th>
            </tr>
        </thead><tbody>`;

    document.querySelectorAll('.student-row').forEach((row, index) => {
        const name = row.querySelector('.name-text').innerText;
        const isPresent = row.querySelector('.present-toggle').checked;
        const status = isPresent ? "PRESENT" : "ABSENT";
        const color = isPresent ? "#c8e6c9" : "#ffcdd2";
        tableHtml += `<tr>
            <td style="text-align:center;">${index + 1}</td>
            <td>${name}</td>
            <td style="text-align:center; background-color:${color}; font-weight:bold;">${status}</td>
            <td></td>
        </tr>`;
    });

    tableHtml += `</tbody></table>`;

    // MOBILE COMPATIBLE EXCEL EXPORT
    const template = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
    <head><meta charset="UTF-8"></head>
    <body>${tableHtml}</body></html>`;

    const blob = new Blob([template], { type: 'application/vnd.ms-excel' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url;
    link.download = `Attendance_${cls}_${dateStr.replace(/ /g, '-')}.xls`;
    link.click();
    
    // Auto-open WhatsApp after download
    setTimeout(() => {
        const msg = `*PARAMOUNT ATTENDANCE*%0A*Teacher:* ${teacher}%0A*Class:* ${cls}%0A*Date:* ${dateStr}%0A_Excel report submitted and downloaded._`;
        window.open(`https://wa.me/919550791538?text=${msg}`, '_blank');
    }, 1500);
}
</script>
</body>
</html>
