<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paramount School | Teacher Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --forest: #006633; --gold: #ffd700; --danger: #e53935; --light: #f4f7f6; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding-bottom: 50px; overflow-x: hidden; }
        header { background: var(--forest); color: white; padding: 20px 3%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header-content { display: flex; align-items: center; justify-content: center; gap: 12px; max-width: 1400px; margin: 0 auto; width: 100%; }
        .header-logo { height: clamp(55px, 8vw, 75px); width: auto; flex-shrink: 0; }
        .school-text { display: flex; flex-direction: column; line-height: 1.1; white-space: nowrap; text-align: left; }
        .school-name-main { font-family: 'Montserrat', sans-serif; font-size: clamp(1.2rem, 3.5vw, 2.2rem); font-weight: 800; }
        .school-name-sub { font-family: 'Montserrat', sans-serif; font-size: clamp(0.6rem, 2vw, 0.9rem); color: var(--gold); font-weight: 700; text-transform: uppercase; }
        .container { max-width: 850px; margin: 20px auto; padding: 0 15px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 25px; border-top: 6px solid var(--forest); }
        h3 { color: var(--forest); margin: 0 0 20px; font-size: 1.4rem; display: flex; align-items: center; gap: 10px; border-bottom: 2px solid #eee; padding-bottom: 10px; justify-content: center; text-transform: uppercase; }
        label { display: block; font-size: 11px; font-weight: bold; color: #666; margin: 15px 0 5px; text-transform: uppercase; }
        select, input, textarea { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #ddd; font-size: 15px; outline: none; }
        .row-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .btn { flex: 1; background: linear-gradient(135deg, var(--forest), #004d26); color: white; border: none; padding: 15px; border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 14px; margin-top: 15px; width: 100%; }
        .btn.warning { background: linear-gradient(135deg, #fb8c00, #ef6c00); }
        .btn.blue { background: linear-gradient(135deg, #2196f3, #1976d2); }
        .student-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

<input type="text" name="fake_user" style="display:none" aria-hidden="true">
<input type="password" name="fake_pass" style="display:none" aria-hidden="true">

<header>
    <div class="header-content">
        <img src="logo.png" class="header-logo" onerror="this.style.display='none'">
        <div class="school-text">
            <span class="school-name-main">PARAMOUNT</span>
            <span class="school-name-sub">ENGLISH MEDIUM SCHOOL</span>
        </div>
    </div>
</header>

<div class="container">
    <div class="nav-buttons-wrapper" style="display:flex; justify-content:center; gap:15px; margin-bottom:20px;">
        <a href="admin.html" style="text-decoration:none; color:var(--forest); font-weight:bold; border:1px solid; padding:8px 15px; border-radius:20px;">Admin Dashboard</a>
        <a href="Parents Checkbox.html" style="text-decoration:none; color:var(--gold); font-weight:bold; border:1px solid; padding:8px 15px; border-radius:20px;">Parents Portal</a>
    </div>

    <div class="card">
        <h3>Mark Attendance</h3>
        <label>Select Teacher</label>
        <select id="teacherSelect" onchange="verifyAccess('attendance')" autocomplete="new-password">
            <option value="">-- Choose Name --</option>
            <option value="Mr. Shaik Ahmad">Mr. Shaik Ahmad</option><option value="Ms. Roqiya Begum">Ms. Roqiya Begum</option>
            <option value="Ms. G.Rajitha">Ms. G.Rajitha</option><option value="Ms. Ameena Tabassum">Ms. Ameena Tabassum</option>
            <option value="Ms. Shaik Shabana">Ms. Shaik Shabana</option><option value="Ms. B.Ravali">Ms. B.Ravali</option>
            <option value="Ms. L.Kalyani">Ms. L.Kalyani</option><option value="Ms. J.Alaya Sree">Ms. J.Alaya Sree</option>
            <option value="Ms. S.Sujatha">Ms. S.Sujatha</option><option value="Ms. J.Prathibha">Ms. J.Prathibha</option>
            <option value="Ms. P.Shailaja">Ms. P.Shailaja</option><option value="Ms. A.Jhansi Rani">Ms. A.Jhansi Rani</option>
            <option value="Ms. S. Neelima">Ms. S. Neelima</option>
        </select>
        <div id="attContent" style="display:none; margin-top:15px;">
            <div class="row-grid">
                <div><label>Class</label><select id="attClass" onchange="loadStudents()"><option value="">-- Select --</option><option value="Grade-8">Grade-8</option></select></div>
                <div><label>Date</label><input type="date" id="attDate" onchange="loadStudents()"></div>
            </div>
            <div id="studentList"></div>
            <button id="submitAtt" class="btn" style="display:none;" onclick="saveAttendance()">Update Attendance</button>
        </div>
    </div>

    <div class="card" style="border-top-color: #2196f3;">
        <h3>Quiz Portal Access</h3>
        <label>Select Teacher (Quiz)</label>
        <select id="quizTeacherSelect" onchange="verifyAccess('quiz')" autocomplete="new-password">
            <option value="">-- Choose Name --</option>
            <option value="Mr. Shaik Ahmad">Mr. Shaik Ahmad</option>
            </select>
        <div id="quizRequestArea" style="display:none; margin-top:15px;">
            <div class="row-grid">
                <div><label>Quiz Class</label><select id="reqQuizClass" onchange="updateQuizSubjects()"><option value="Grade-8">Grade-8</option></select></div>
                <div><label>Quiz Subject</label><select id="reqQuizSubject"></select></div>
            </div>
            <button class="btn warning" id="reqBtn" onclick="requestQuizAccess()">Send Request to Admin</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDRYk9KOK-ga0c88dnYMsAoifW2NJTd_Y8", databaseURL: "https://paramount-school-d55bc-default-rtdb.firebaseio.com", projectId: "paramount-school-d55bc" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const registry = { "Mr. Shaik Ahmad": "Ahmad@123", "Ms. Roqiya Begum": "Roqiya@123" /* Add others */ };

    async function verifyAccess(section) {
        let selectId = section === 'attendance' ? 'teacherSelect' : 'quizTeacherSelect';
        const name = document.getElementById(selectId).value;
        if(!name) return;

        // Forced clean start for the popup
        const { value: pw } = await Swal.fire({
            title: `Welcome ${name}!`,
            text: 'Enter password to proceed.',
            input: 'password',
            showCancelButton: true,
            inputAttributes: {
                autocomplete: 'new-password', // Browser standard to stop autofill
                autocapitalize: 'off',
                autocorrect: 'off'
            },
            didOpen: () => {
                // Manually clear any browser intervention
                const input = Swal.getInput();
                input.value = '';
            }
        });

        if(pw === registry[name]) {
            document.getElementById(section === 'attendance' ? 'attContent' : 'quizRequestArea').style.display = 'block';
            Swal.fire({ title: 'Unlocked', icon: 'success', timer: 800, showConfirmButton: false });
        } else {
            document.getElementById(selectId).value = "";
            if(pw) Swal.fire('Error', 'Wrong Password', 'error');
        }
    }

    function requestQuizAccess() {
        const teacher = document.getElementById('quizTeacherSelect').value;
        if(!teacher) return;
        const teacherId = teacher.replace(/\s+/g, '_'); 

        Swal.fire({
            title: 'Request Submitted!',
            text: 'Please wait for the Admin to accept.',
            icon: 'success',
            confirmButtonColor: '#006633'
        });

        db.ref(`quiz_requests/${teacherId}`).set({
            teacher: teacher,
            class: document.getElementById('reqQuizClass').value,
            subject: document.getElementById('reqQuizSubject').value,
            status: 'pending',
            timestamp: Date.now()
        });
    }
</script>
</body>
</html>
